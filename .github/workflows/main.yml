name: Node.js CI Build
on: [workflow_dispatch]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update -qq && sudo apt-get install -y clang python3-pip tmux -qq
          npm install -g @charmland/crush qwen-proxy
          echo 'cd /home/runner/work/rndstuff/rndstuff/workspace' >> ~/.bashrc
          echo 'env -u TMUX tmux new-session -A -s brain' >> ~/.bashrc
      - run: git clone https://${{ secrets.GH_SYNC_TOKEN }}@github.com/ENUSSOUL001/Hm.git workspace
      - run: |
          mkdir -p ~/.qwen
          echo '${{ secrets.CACHE_BLOB }}' > ~/.qwen/oauth_creds_acc1.json
          echo '${{ secrets.CACHE_BLOB_2 }}' > ~/.qwen/oauth_creds_acc2.json
      - run: |
          mkdir -p ~/.config/crush
          cat << 'EOF' > ~/.config/crush/crush.json
          {
            "providers": {
              "proxy": {
                "name": "Qwen Proxy (Free)",
                "type": "openai-compat",
                "base_url": "http://localhost:8080/v1",
                "api_key": "dummy",
                "models":[{"id": "coder-model", "name": "Qwen 3.6 Plus", "context_window": 1000000}]
              }
            },
            "options": {"tui": {"compact_mode": true}}
          }
          EOF
      - run: |
          export QWEN_CODE_AUTH_USE=false
          qwen-proxy serve --headless > /home/runner/proxy.log 2>&1 &
          sleep 3
          cat /home/runner/proxy.log
      - uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          limit-access-to-actor: true
      - run: sleep 21300
      - if: always()
        run: |
          cd /home/runner/work/rndstuff/rndstuff/workspace
          git config --global user.name "ENUSSOUL001"
          git config --global user.email "enussoul@gmail.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "Auto-save: session finished or terminated" && git push)
