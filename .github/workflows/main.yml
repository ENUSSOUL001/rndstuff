# ╔══════════════════════════════════════════════════════════════════════════╗
# ║               ☁  CLOUD HUB OS  —  GitHub Actions Runner                ║
# ║                                                                          ║
# ║  A persistent, multi-user cloud terminal environment.                   ║
# ║  Access via SSH or browser from any device (Termux, iOS, Linux, etc.)  ║
# ║                                                                          ║
# ║  REQUIRED SECRETS (Settings → Secrets → Actions):                       ║
# ║    GH_SYNC_TOKEN   — GitHub PAT (scopes: repo, workflow)                ║
# ║    CACHE_BLOB      — Qwen oauth credentials JSON (account 1)            ║
# ║    CACHE_BLOB_2    — Qwen oauth credentials JSON (account 2)            ║
# ║                                                                          ║
# ║  TOOLS AVAILABLE IN EVERY SHELL:                                        ║
# ║    hub        → main OS menu                                             ║
# ║    cdw        → cd to current repo root                                 ║
# ║    go [name]  → switch to another repo (fuzzy name match or picker)     ║
# ║    save [msg] → git add + commit + push current repo                    ║
# ║    secrets    → open secret manager (push secrets to GitHub)            ║
# ║    crush -y   → start AI code analysis                                  ║
# ╚══════════════════════════════════════════════════════════════════════════╝

name: ☁ Cloud Hub OS

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Session label shown in the OS header'
        required: false
        default: 'Cloud Hub OS'
        type: string
      timeout:
        description: 'Session timeout in minutes (max 360 on free runners)'
        required: false
        default: '360'
        type: string

jobs:
  cloud-os:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Hard cap at GitHub max

    steps:

      # ──────────────────────────────────────────────────────────────────────
      #  1. BASE SETUP
      # ──────────────────────────────────────────────────────────────────────

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ──────────────────────────────────────────────────────────────────────
      #  2. INSTALL SYSTEM DEPENDENCIES
      #     clang, python, node are required by the OS rule.
      #     tmate = SSH tunnel | tmux = session manager | dialog = TUI menus
      #     libsodium-dev + PyNaCl = GitHub Secrets API encryption
      # ──────────────────────────────────────────────────────────────────────

      - name: Install System Packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            tmux \
            tmate \
            dialog \
            jq \
            python3-pip \
            libsodium-dev \
            git
          pip install PyNaCl --break-system-packages -q

      - name: Install Node Global Tools
        run: |
          npm install -g @charmland/crush qwen-proxy --silent --no-fund --no-audit

      # ──────────────────────────────────────────────────────────────────────
      #  3. BUILD THE SECRET ENCRYPTION HELPER
      #     Used by the hub to push secrets to GitHub via REST API.
      #     GitHub requires secrets to be encrypted with the repo's
      #     LibSodium public key before they can be stored.
      # ──────────────────────────────────────────────────────────────────────

      - name: Build Secret Encryption Helper
        run: |
          sudo tee /usr/local/bin/hub_encrypt.py > /dev/null << 'PYEOF'
          #!/usr/bin/env python3
          # Usage: hub_encrypt.py <base64_public_key> <secret_value>
          # Prints base64-encoded sealed box (libsodium) for GitHub Secrets API.
          import sys, base64
          from nacl import encoding, public

          if len(sys.argv) != 3:
              print("Usage: hub_encrypt.py <b64_pubkey> <secret_value>", file=sys.stderr)
              sys.exit(1)

          pub_b64 = sys.argv[1]
          secret  = sys.argv[2]

          try:
              pk  = public.PublicKey(pub_b64.encode(), encoding.Base64Encoder())
              box = public.SealedBox(pk)
              enc = box.encrypt(secret.encode())
              print(base64.b64encode(enc).decode())
          except Exception as e:
              print(f"Encryption error: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          sudo chmod +x /usr/local/bin/hub_encrypt.py

      # ──────────────────────────────────────────────────────────────────────
      #  4. BUILD THE HUB OS SHARED LIBRARY
      #     All core logic lives here. hub, secrets, and other tools source
      #     this file so functions are shared without duplication.
      # ──────────────────────────────────────────────────────────────────────

      - name: Build Hub OS Library
        run: |
          sudo mkdir -p /usr/local/lib/hubos
          sudo tee /usr/local/lib/hubos/lib.sh > /dev/null << 'LIBEOF'
          # ── Hub OS Shared Library ─────────────────────────────────────────
          # Source this file; do not execute directly.

          export HUB_DIR="$HOME/.crush_hub"
          export USERS_DIR="$HUB_DIR/users"
          export WORKSPACES="$HOME/workspaces"
          export HUB_CONF="$HUB_DIR/config"
          export TMUX_SOCK="/tmp/cloud-os.sock"
          export SESSION_LABEL="${SESSION_LABEL:-Cloud Hub OS}"

          mkdir -p "$USERS_DIR" "$WORKSPACES" "$HUB_CONF"

          # ── Get active user ───────────────────────────────────────────────
          hub_active_user() {
            cat "$HUB_CONF/active_user" 2>/dev/null \
              || ls -1t "$USERS_DIR" 2>/dev/null | head -n1 \
              || echo "default"
          }

          # ── Set active user ───────────────────────────────────────────────
          hub_set_user() {
            echo "$1" > "$HUB_CONF/active_user"
          }

          # ── Read user PAT ─────────────────────────────────────────────────
          hub_user_pat() {
            local u="${1:-$(hub_active_user)}"
            cat "$USERS_DIR/$u/pat" 2>/dev/null
          }

          # ── Read user email ───────────────────────────────────────────────
          hub_user_email() {
            local u="${1:-$(hub_active_user)}"
            cat "$USERS_DIR/$u/email" 2>/dev/null || echo "${u}@cloud.local"
          }

          # ── Read current repo path ────────────────────────────────────────
          hub_current_repo() {
            cat "$HUB_CONF/current_repo" 2>/dev/null
          }

          # ── Set current repo path ─────────────────────────────────────────
          hub_set_repo() {
            echo "$1" > "$HUB_CONF/current_repo"
          }

          # ── Read GitHub repo (owner/name) from env or config ──────────────
          hub_github_repo() {
            echo "${GITHUB_REPOSITORY:-$(cat "$HUB_CONF/github_repo" 2>/dev/null)}"
          }

          # ─────────────────────────────────────────────────────────────────
          #  Push a GitHub Actions secret via REST API
          #  Usage: hub_push_secret SECRET_NAME value [pat]
          # ─────────────────────────────────────────────────────────────────
          hub_push_secret() {
            local sname="$1"
            local sval="$2"
            local pat="${3:-$(hub_user_pat)}"
            local repo
            repo="$(hub_github_repo)"

            if [ -z "$pat" ]; then
              dialog --msgbox "ERROR: No PAT found for current user.\nAdd a user with a PAT first." 7 52
              return 1
            fi
            if [ -z "$repo" ]; then
              dialog --msgbox "ERROR: GitHub repo not set.\nExpected format: owner/repo-name" 7 52
              return 1
            fi
            if [ -z "$sname" ] || [ -z "$sval" ]; then
              dialog --msgbox "ERROR: Secret name or value is empty." 5 45
              return 1
            fi

            # Fetch repo public key for encryption
            local pk_json
            pk_json=$(curl -sf \
              -H "Authorization: Bearer $pat" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/actions/secrets/public-key" 2>/dev/null)

            if [ -z "$pk_json" ] || [ "$(echo "$pk_json" | jq -r '.key // empty')" = "" ]; then
              dialog --msgbox "ERROR: Could not fetch repo public key.\nCheck that PAT has 'repo' scope." 7 55
              return 1
            fi

            local key_id key_val
            key_id=$(echo "$pk_json" | jq -r '.key_id')
            key_val=$(echo "$pk_json" | jq -r '.key')

            # Encrypt with LibSodium (SealedBox)
            local encrypted
            encrypted=$(python3 /usr/local/bin/hub_encrypt.py "$key_val" "$sval" 2>/dev/null)
            if [ -z "$encrypted" ]; then
              dialog --msgbox "ERROR: Encryption failed.\nIs PyNaCl installed? (pip install PyNaCl)" 7 55
              return 1
            fi

            # PUT to GitHub Secrets API
            local http_code
            http_code=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $pat" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/actions/secrets/$sname" \
              -d "{\"encrypted_value\":\"$encrypted\",\"key_id\":\"$key_id\"}" 2>/dev/null) || true

            case "$http_code" in
              201|204)
                dialog --msgbox "✅ Secret '$sname' saved to GitHub!\n\nIt will be available on the NEXT workflow run.\nCurrent session already has the original value." 9 58
                ;;
              401|403)
                dialog --msgbox "ERROR HTTP $http_code: Permission denied.\nPAT needs 'repo' scope (not fine-grained for secrets)." 7 58
                ;;
              404)
                dialog --msgbox "ERROR HTTP 404: Repo not found.\nCheck '$repo' is correct and PAT has access." 7 58
                ;;
              *)
                dialog --msgbox "ERROR: API returned HTTP $http_code.\nCheck PAT permissions and repo name." 6 55
                ;;
            esac
          }

          # ─────────────────────────────────────────────────────────────────
          #  Save a repo: git add, commit, push
          #  Usage: hub_save_repo /path/to/repo [commit message] [user]
          # ─────────────────────────────────────────────────────────────────
          hub_save_repo() {
            local repo_path="$1"
            local msg="${2:-Cloud session sync $(date -u '+%Y-%m-%d %H:%M UTC')}"
            local user="${3:-$(hub_active_user)}"

            [ -d "$repo_path/.git" ] || return 1

            (
              cd "$repo_path" || return 1
              git config user.name  "$user"
              git config user.email "$(hub_user_email "$user")"
              git add -A
              if git diff-index --quiet HEAD 2>/dev/null; then
                echo "  ✓ $(basename "$repo_path") — nothing to commit"
              else
                git commit -m "$msg" && git push \
                  && echo "  ✅ $(basename "$repo_path") saved"
              fi
            ) 2>&1
          }

          # ─────────────────────────────────────────────────────────────────
          #  Ensure the active user has their own named tmux/tmate window.
          #  This lets multiple users work independently in the same session.
          # ─────────────────────────────────────────────────────────────────
          hub_ensure_window() {
            local user="${1:-$(hub_active_user)}"
            local win_name="u-${user}"
            if [ -n "$TMUX" ] || tmate -S "$TMUX_SOCK" ls 2>/dev/null | grep -q .; then
              local sock="${TMUX:-$TMUX_SOCK}"
              if ! tmate -S "$TMUX_SOCK" list-windows -F '#W' 2>/dev/null | grep -qx "$win_name"; then
                tmate -S "$TMUX_SOCK" new-window -n "$win_name" 2>/dev/null
              fi
              [ -n "$TMUX" ] && tmux select-window -t "$win_name" 2>/dev/null
            fi
          }

          LIBEOF
          sudo chmod 644 /usr/local/lib/hubos/lib.sh

      # ──────────────────────────────────────────────────────────────────────
      #  5. BUILD THE MAIN HUB OS SCRIPT
      # ──────────────────────────────────────────────────────────────────────

      - name: Build Hub OS Main Script
        run: |
          sudo tee /usr/local/bin/hub > /dev/null << 'HUBEOF'
          #!/bin/bash
          # Hub OS — Main menu entrypoint
          source /usr/local/lib/hubos/lib.sh

          CURRENT_USER="$(hub_active_user)"

          # ── Secrets Manager Menu ──────────────────────────────────────────
          _menu_secrets() {
            while true; do
              local REPO
              REPO="$(hub_github_repo)"
              local SCHOICE
              SCHOICE=$(dialog --clear --title "🔐 Secret Manager" \
                --menu "Repo: ${REPO:-not set}  |  Push secrets for future runs" \
                18 62 6 \
                1 "Save PAT → GH_SYNC_TOKEN" \
                2 "Save Qwen blob 1 → CACHE_BLOB" \
                3 "Save Qwen blob 2 → CACHE_BLOB_2" \
                4 "Push a custom secret..." \
                5 "ℹ  What is this?" \
                6 "← Back" \
                3>&1 1>&2 2>&3) || return

              case "$SCHOICE" in
                1)
                  local v
                  v=$(dialog --clear --passwordbox \
                    "Paste a GitHub PAT with 'repo' + 'workflow' scopes.\nThis will be saved as GH_SYNC_TOKEN:" \
                    9 58 3>&1 1>&2 2>&3)
                  [ -n "$v" ] && hub_push_secret "GH_SYNC_TOKEN" "$v"
                  ;;
                2)
                  local v
                  v=$(dialog --clear --inputbox "Paste CACHE_BLOB JSON content:" 10 62 3>&1 1>&2 2>&3)
                  [ -n "$v" ] && hub_push_secret "CACHE_BLOB" "$v"
                  ;;
                3)
                  local v
                  v=$(dialog --clear --inputbox "Paste CACHE_BLOB_2 JSON content:" 10 62 3>&1 1>&2 2>&3)
                  [ -n "$v" ] && hub_push_secret "CACHE_BLOB_2" "$v"
                  ;;
                4)
                  local sname
                  sname=$(dialog --clear --inputbox "Secret name (e.g. MY_API_KEY):" 8 48 3>&1 1>&2 2>&3)
                  if [ -n "$sname" ]; then
                    local sval
                    sval=$(dialog --clear --passwordbox "Secret value:" 8 48 3>&1 1>&2 2>&3)
                    [ -n "$sval" ] && hub_push_secret "$sname" "$sval"
                  fi
                  ;;
                5)
                  dialog --msgbox \
                    "Secrets pushed here are stored on GitHub\nand loaded automatically on the NEXT run.\n\nYou need a PAT with 'repo' scope and\nadmin access to the repository.\n\nCurrent session won't see new values\n(it already started with the old ones)." \
                    12 55
                  ;;
                6) return ;;
              esac
            done
          }

          # ── Repository Picker Menu ────────────────────────────────────────
          _menu_repos() {
            local PAT
            PAT="$(hub_user_pat "$CURRENT_USER")"
            if [ -z "$PAT" ]; then
              dialog --msgbox "No PAT found for '$CURRENT_USER'.\nSwitch/add a user first (option 2)." 6 52
              return
            fi

            dialog --infobox "Fetching repositories for $CURRENT_USER..." 4 50
            local REPOS
            REPOS=$(curl -sf \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/repos?per_page=100&sort=updated&affiliation=owner,collaborator" \
              | jq -r '.[].full_name' 2>/dev/null)

            if [ -z "$REPOS" ]; then
              dialog --msgbox "Failed to fetch repos.\nCheck PAT is valid and has 'repo' scope." 6 52
              return
            fi

            # Build dialog array (tag desc pairs) — safe for names with spaces
            local OPTS=()
            while IFS= read -r r; do
              OPTS+=("$r" "→")
            done <<< "$REPOS"

            local REPO_CHOICE
            REPO_CHOICE=$(dialog --clear --title "📂 Repositories" \
              --menu "Select to clone / open:" 24 64 16 \
              "${OPTS[@]}" 3>&1 1>&2 2>&3) || return

            local SHORT="${REPO_CHOICE##*/}"
            local REPO_DIR="$WORKSPACES/$CURRENT_USER/$SHORT"

            if [ ! -d "$REPO_DIR/.git" ]; then
              dialog --infobox "Cloning $REPO_CHOICE ..." 4 50
              if ! git clone "https://$CURRENT_USER:$PAT@github.com/$REPO_CHOICE.git" \
                  "$REPO_DIR" > /dev/null 2>&1; then
                dialog --msgbox "Clone failed for $REPO_CHOICE.\nCheck PAT and repo access." 6 50
                return
              fi
              # Set up git identity for this repo
              git -C "$REPO_DIR" config user.name  "$CURRENT_USER"
              git -C "$REPO_DIR" config user.email "$(hub_user_email "$CURRENT_USER")"
            fi

            hub_set_repo "$REPO_DIR"
            clear
            printf '\e[1;32m'
            cat << BANNER
          ╔══════════════════════════════════════════════╗
          ║  ✅ Connected: %-28s ║
          ║  📁 %-40s ║
          ╠══════════════════════════════════════════════╣
          ║  crush -y   → AI analysis                   ║
          ║  cdw        → jump to repo root             ║
          ║  go [name]  → switch to another repo        ║
          ║  save       → commit & push                 ║
          ║  secrets    → manage GitHub secrets         ║
          ║  hub        → back to main menu             ║
          ╚══════════════════════════════════════════════╝
          BANNER
            printf '\e[0m'
            # Start an interactive shell rooted in the repo
            bash --rcfile <(cat ~/.bashrc; echo "cd '$REPO_DIR'")
          }

          # ── User Management Menu ──────────────────────────────────────────
          _menu_users() {
            while true; do
              local USERS_LIST
              USERS_LIST=$(ls -1 "$USERS_DIR" 2>/dev/null)
              local OPTS=()
              while IFS= read -r u; do
                [ -n "$u" ] && OPTS+=("$u" "switch →")
              done <<< "$USERS_LIST"
              OPTS+=("__add__" "+ Add new user")

              local U_CHOICE
              U_CHOICE=$(dialog --clear --title "👥 User Profiles" \
                --menu "Active: $CURRENT_USER" 18 52 10 \
                "${OPTS[@]}" 3>&1 1>&2 2>&3) || return

              if [ "$U_CHOICE" = "__add__" ]; then
                _add_user
              elif [ -n "$U_CHOICE" ]; then
                CURRENT_USER="$U_CHOICE"
                hub_set_user "$CURRENT_USER"
                hub_ensure_window "$CURRENT_USER"
                dialog --msgbox "✅ Switched to '$CURRENT_USER'" 5 35
                return
              fi
            done
          }

          # ── Add New User ──────────────────────────────────────────────────
          _add_user() {
            local NEW_USER
            NEW_USER=$(dialog --clear --inputbox "GitHub Username:" 8 48 3>&1 1>&2 2>&3)
            [ -z "$NEW_USER" ] && return

            local NEW_PAT
            NEW_PAT=$(dialog --clear --passwordbox \
              "GitHub Personal Access Token\n(needs: repo, workflow scopes):" \
              9 52 3>&1 1>&2 2>&3)
            [ -z "$NEW_PAT" ] && return

            dialog --infobox "Verifying credentials for $NEW_USER..." 4 45

            local PROFILE
            PROFILE=$(curl -sf \
              -H "Authorization: token $NEW_PAT" \
              https://api.github.com/user 2>/dev/null)

            if [ -z "$PROFILE" ]; then
              dialog --msgbox "ERROR: Could not verify credentials.\nCheck the PAT and try again." 6 50
              return
            fi

            local GH_NAME
            GH_NAME=$(echo "$PROFILE" | jq -r '.login // empty')
            local NEW_EMAIL
            NEW_EMAIL=$(echo "$PROFILE" | jq -r '.email // empty')

            if [ -z "$NEW_EMAIL" ] || [ "$NEW_EMAIL" = "null" ]; then
              NEW_EMAIL=$(dialog --clear --inputbox \
                "Email not on public profile.\nEnter your git commit email:" \
                9 52 3>&1 1>&2 2>&3)
              [ -z "$NEW_EMAIL" ] && NEW_EMAIL="${NEW_USER}@cloud.local"
            fi

            mkdir -p "$USERS_DIR/$NEW_USER"
            echo "$NEW_PAT"   > "$USERS_DIR/$NEW_USER/pat"
            echo "$NEW_EMAIL" > "$USERS_DIR/$NEW_USER/email"
            CURRENT_USER="$NEW_USER"
            hub_set_user "$CURRENT_USER"
            hub_ensure_window "$CURRENT_USER"

            # Offer to persist PAT as GitHub secret for next run
            if dialog --yesno \
              "User '$NEW_USER' added! ✅\n\nDo you want to save this PAT as\nGH_SYNC_TOKEN in GitHub Secrets?\n(makes it available on next run)" \
              10 55; then
              hub_push_secret "GH_SYNC_TOKEN" "$NEW_PAT" "$NEW_PAT"
            fi
          }

          # ── Save All Repos ────────────────────────────────────────────────
          _save_all() {
            dialog --infobox "Saving all open repositories..." 4 40
            local results=""
            for repo_dir in "$WORKSPACES/$CURRENT_USER"/*/; do
              [ -d "$repo_dir/.git" ] || continue
              local out
              out=$(hub_save_repo "$repo_dir" "Manual cloud save" "$CURRENT_USER")
              results+="$out\n"
            done
            dialog --msgbox "Save complete:\n\n${results:-No repos found.}" 14 55
          }

          # ── Main Loop ─────────────────────────────────────────────────────
          hub_ensure_window "$CURRENT_USER"

          while true; do
            CURRENT_USER="$(hub_active_user)"
            local CHOICE
            CHOICE=$(dialog --clear \
              --title "☁ $SESSION_LABEL" \
              --menu "User: $CURRENT_USER  |  $(date '+%a %H:%M')  |  Type 'hub' to return here" \
              20 62 7 \
              1 "📂 Select / Clone Repository" \
              2 "👥 Switch / Add User" \
              3 "🔐 Manage GitHub Secrets" \
              4 "💾 Save All Open Repos" \
              5 "📋 Tmux Window List" \
              6 "🐚 Drop to Shell" \
              7 "❌ Exit Hub" \
              3>&1 1>&2 2>&3)

            # Escape or empty = drop to shell
            [ $? -ne 0 ] && CHOICE=6

            case "$CHOICE" in
              1) _menu_repos  ;;
              2) _menu_users  ;;
              3) _menu_secrets ;;
              4) _save_all    ;;
              5)
                clear
                echo "══ tmux Windows (Ctrl+B [num] to switch) ══"
                tmate -S "$TMUX_SOCK" list-windows 2>/dev/null \
                  || tmux list-windows 2>/dev/null \
                  || echo "(not in a tmux session)"
                echo ""
                read -rp "Press Enter to return to menu..." _dummy
                ;;
              6)
                clear
                cat << 'SHELLTIP'
          ┌─────────────────────────────────────────────────────┐
          │  Shell Quick Reference                              │
          │  hub           → return to main menu               │
          │  cdw           → cd to current repo root           │
          │  go [name]     → switch repos (fuzzy or picker)    │
          │  save [msg]    → commit & push current repo        │
          │  secrets       → open secret manager               │
          │  crush -y      → AI analysis                       │
          │                                                     │
          │  Tmux keys (when connected):                        │
          │  Ctrl+B c      → new window                        │
          │  Ctrl+B n/p    → next / previous window            │
          │  Ctrl+B [1-9]  → jump to window number             │
          │  Ctrl+B d      → detach (session stays alive!)     │
          └─────────────────────────────────────────────────────┘
          SHELLTIP
                break
                ;;
              7)
                clear
                echo "Goodbye! Session continues in background."
                exit 0
                ;;
            esac
          done
          HUBEOF
          sudo chmod +x /usr/local/bin/hub

      # ──────────────────────────────────────────────────────────────────────
      #  6. BUILD HELPER TOOLS
      #     cdw / go must be shell FUNCTIONS (not scripts) so they can `cd`
      #     in the calling shell. They go into ~/.bashrc.
      #     save / secrets ARE standalone scripts (they don't need to cd).
      # ──────────────────────────────────────────────────────────────────────

      - name: Build Helper Tools
        run: |
          # ── standalone: save ──────────────────────────────────────────────
          sudo tee /usr/local/bin/save > /dev/null << 'SAVEEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          USER="$(hub_active_user)"
          REPO="$(hub_current_repo)"
          TARGET="${REPO:-$(pwd)}"
          MSG="${1:-Cloud session save $(date -u '+%Y-%m-%d %H:%M UTC')}"
          if [ ! -d "$TARGET/.git" ]; then
            echo "⚠  No git repo at $TARGET. Use 'go' or 'cdw' to navigate to one."
            exit 1
          fi
          cd "$TARGET" || exit 1
          git config user.name  "$USER"
          git config user.email "$(hub_user_email "$USER")"
          git add -A
          if git diff-index --quiet HEAD 2>/dev/null; then
            echo "✅ Nothing to commit in $(basename "$TARGET")"
          else
            git commit -m "$MSG" && git push \
              && echo "✅ Saved & pushed: $TARGET"
          fi
          SAVEEOF
          sudo chmod +x /usr/local/bin/save

          # ── standalone: secrets ───────────────────────────────────────────
          sudo tee /usr/local/bin/secrets > /dev/null << 'SECEOF'
          #!/bin/bash
          # Opens secret manager outside of hub main loop
          source /usr/local/lib/hubos/lib.sh

          hub_push_secret_interactive() {
            local SNAME SVAL
            SNAME=$(dialog --clear --inputbox "Secret name:" 8 48 3>&1 1>&2 2>&3) || return
            SVAL=$(dialog --clear --passwordbox "Secret value:" 8 48 3>&1 1>&2 2>&3) || return
            [ -n "$SNAME" ] && [ -n "$SVAL" ] && hub_push_secret "$SNAME" "$SVAL"
          }

          while true; do
            CHOICE=$(dialog --clear --title "🔐 Quick Secret Manager" \
              --menu "Repo: $(hub_github_repo)" 14 58 5 \
              1 "Push GH_SYNC_TOKEN (PAT)" \
              2 "Push CACHE_BLOB" \
              3 "Push CACHE_BLOB_2" \
              4 "Push custom secret" \
              5 "Exit" \
              3>&1 1>&2 2>&3) || break
            case "$CHOICE" in
              1) v=$(dialog --clear --passwordbox "PAT value:" 8 48 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "GH_SYNC_TOKEN" "$v" ;;
              2) v=$(dialog --clear --inputbox  "CACHE_BLOB value:" 10 58 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "CACHE_BLOB" "$v" ;;
              3) v=$(dialog --clear --inputbox  "CACHE_BLOB_2 value:" 10 58 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "CACHE_BLOB_2" "$v" ;;
              4) hub_push_secret_interactive ;;
              5) break ;;
            esac
          done
          SECEOF
          sudo chmod +x /usr/local/bin/secrets

          # ── bashrc functions: cdw, go ─────────────────────────────────────
          # These MUST be shell functions (not scripts) because `cd` only
          # takes effect in the calling shell, not in subprocesses.
          cat >> ~/.bashrc << 'RCEOF'

          # ── Hub OS shell functions ────────────────────────────────────────
          source /usr/local/lib/hubos/lib.sh 2>/dev/null

          # cdw: go to current repo root
          cdw() {
            local REPO
            REPO="$(hub_current_repo)"
            if [ -z "$REPO" ] || [ ! -d "$REPO" ]; then
              echo "No repo set. Use 'hub → Select Repository' first, or 'go <name>'."
              return 1
            fi
            cd "$REPO" && echo "📁 $REPO"
          }

          # go [name]: switch to a repo by fuzzy name, or open a picker
          go() {
            local USER WORKDIR TARGET
            USER="$(hub_active_user)"
            WORKDIR="$WORKSPACES/$USER"

            if [ -n "$1" ]; then
              # Fuzzy match on repo name
              TARGET=$(find "$WORKDIR" -maxdepth 1 -type d -name "*$1*" 2>/dev/null | head -1)
              if [ -z "$TARGET" ]; then
                echo "No repo matching '$1' found under $WORKDIR"
                echo "Available:"
                ls -1 "$WORKDIR" 2>/dev/null || echo "  (none cloned yet)"
                return 1
              fi
            else
              # Interactive picker
              local OPTS=()
              while IFS= read -r d; do
                [ -d "$d/.git" ] && OPTS+=("$(basename "$d")" "→ $d")
              done < <(find "$WORKDIR" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort)

              if [ ${#OPTS[@]} -eq 0 ]; then
                echo "No local repos found. Clone one via 'hub'."
                return 1
              fi

              local CHOICE
              CHOICE=$(dialog --clear --title "Go To Repo" \
                --menu "Select:" 18 60 12 "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
              TARGET="$WORKDIR/$CHOICE"
            fi

            hub_set_repo "$TARGET"
            cd "$TARGET" && echo "📁 $TARGET"
          }

          # Convenience alias
          alias hub='hub'
          RCEOF

      # ──────────────────────────────────────────────────────────────────────
      #  7. CONFIGURE PRE-LOADED USER
      # ──────────────────────────────────────────────────────────────────────

      - name: Configure Pre-loaded User
        run: |
          source /usr/local/lib/hubos/lib.sh

          mkdir -p "$USERS_DIR/${{ github.actor }}"
          printf '%s' '${{ secrets.GH_SYNC_TOKEN }}' \
            > "$USERS_DIR/${{ github.actor }}/pat"
          printf '%s' '${{ github.actor }}@cloud.local' \
            > "$USERS_DIR/${{ github.actor }}/email"
          hub_set_user "${{ github.actor }}"

          # Store repo info for Secrets API (non-secret, just metadata)
          printf '%s' '${{ github.repository }}' > "$HUB_CONF/github_repo"

          echo "✅ Pre-loaded user: ${{ github.actor }}"
          echo "✅ Repo context:    ${{ github.repository }}"

      # ──────────────────────────────────────────────────────────────────────
      #  8. CONFIGURE QWEN + CRUSH
      # ──────────────────────────────────────────────────────────────────────

      - name: Setup Qwen Credentials & Crush Config
        run: |
          mkdir -p ~/.qwen ~/.config/crush
          printf '%s' '${{ secrets.CACHE_BLOB }}'   > ~/.qwen/oauth_creds_acc1.json
          printf '%s' '${{ secrets.CACHE_BLOB_2 }}' > ~/.qwen/oauth_creds_acc2.json

          cat > ~/.config/crush/crush.json << 'EOF'
          {
            "providers": {
              "proxy": {
                "name": "Qwen Proxy (Free)",
                "type": "openai-compat",
                "base_url": "http://localhost:8080/v1",
                "api_key": "dummy",
                "models": [
                  {
                    "id": "coder-model",
                    "name": "Qwen 3.6 Plus",
                    "context_window": 1000000
                  }
                ]
              }
            },
            "options": {
              "tui": { "compact_mode": true }
            }
          }
          EOF

      # ──────────────────────────────────────────────────────────────────────
      #  9. START QWEN PROXY
      # ──────────────────────────────────────────────────────────────────────

      - name: Start Qwen Proxy
        run: |
          export QWEN_CODE_AUTH_USE=false
          qwen-proxy serve --headless > ~/proxy.log 2>&1 &
          sleep 6
          echo "═══════════ PROXY LOGS ═══════════"
          cat ~/proxy.log
          echo "══════════════════════════════════"

      # ──────────────────────────────────────────────────────────────────────
      #  10. CONFIGURE TMUX APPEARANCE
      # ──────────────────────────────────────────────────────────────────────

      - name: Configure Tmux
        run: |
          cat > ~/.tmux.conf << 'EOF'
          # ── Cloud Hub OS tmux config ──────────────────────────────────────
          set -g status-style        bg=colour236,fg=colour255
          set -g status-left         "#[fg=colour82,bold] ☁ Cloud OS #[fg=colour245]| "
          set -g status-right        "#[fg=colour245]%a %H:%M  #[fg=colour82]#{session_windows} wins "
          set -g status-left-length  28
          set -g status-right-length 35
          set -g window-status-format         " #I:#W "
          set -g window-status-current-format "#[fg=colour82,bold,bg=colour238] #I:#W● "
          set -g window-status-separator      ""

          # Quality of life
          set -g mouse on
          set -g history-limit 50000
          set -g base-index 1
          set -g pane-base-index 1
          set -g default-terminal "screen-256color"
          set -g escape-time 10
          set -g renumber-windows on

          # Key bindings
          bind r source-file ~/.tmux.conf \; display "Config reloaded!"
          bind H hub                        # Ctrl+B H → open hub
          bind S run-shell "save"           # Ctrl+B S → save current repo
          EOF

      # ──────────────────────────────────────────────────────────────────────
      #  11. LAUNCH CLOUD OS + WATCHTOWER
      #
      #  Architecture:
      #    tmate creates a shared tmux-compatible session accessible via SSH
      #    and browser. Each user gets their own named window (u-username)
      #    created by hub on first use.
      #
      #  Multi-user behaviour:
      #    - All users share the same tmate session (by design).
      #    - Each user navigates to their own window: Ctrl+B [num]
      #    - hub auto-creates and selects your personal window.
      #    - Users can work fully independently in separate windows.
      #    - Window 1 (monitor) shows links + activity log.
      # ──────────────────────────────────────────────────────────────────────

      - name: Launch Cloud Hub OS
        env:
          SESSION_LABEL: ${{ inputs.label || 'Cloud Hub OS' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_SYNC_TOKEN: ${{ secrets.GH_SYNC_TOKEN }}
        run: |
          SOCK=/tmp/cloud-os.sock
          ACTOR="${{ github.actor }}"
          SESSION_LABEL="${SESSION_LABEL:-Cloud Hub OS}"
          REPO="${GITHUB_REPOSITORY}"

          # ── SSH keys: authorize the actor's GitHub keys ───────────────────
          mkdir -p ~/.ssh
          curl -sf "https://github.com/$ACTOR.keys" >> ~/.ssh/authorized_keys 2>/dev/null || true
          chmod 600 ~/.ssh/authorized_keys

          # ── Export env to bashrc so all new shells inherit it ─────────────
          cat >> ~/.bashrc << ENVEOF
          export SESSION_LABEL="$SESSION_LABEL"
          export GITHUB_REPOSITORY="$REPO"
          export GITHUB_REPOSITORY_OWNER="${GITHUB_REPOSITORY_OWNER}"
          ENVEOF

          # ── Create tmate session: window 1 = monitor ──────────────────────
          tmate -S "$SOCK" -a ~/.ssh/authorized_keys \
            new-session -d -s "cloud" -n "🖥 monitor" \
            -x 220 -y 50

          # Wait for tmate to register with ssh.tmate.io
          tmate -S "$SOCK" wait tmate-ready

          SSH_LINK=$(tmate -S "$SOCK" display -p '#{tmate_ssh}')
          SESSION_ID=$(echo "$SSH_LINK" | cut -d'@' -f1 | cut -d' ' -f2)
          WEB_LINK="https://tmate.io/t/$SESSION_ID"

          # ── Display MOTD in monitor window ────────────────────────────────
          tmate -S "$SOCK" send-keys -t "cloud:🖥 monitor" \
            "source ~/.bashrc; clear; cat << 'MOTD'
          ╔═══════════════════════════════════════════════════════════╗
          ║  ☁  ${SESSION_LABEL}                                     
          ║  SSH : $SSH_LINK  
          ║  WEB : $WEB_LINK  
          ╠═══════════════════════════════════════════════════════════╣
          ║  Waiting for connections...                               ║
          ║  Other users: share the SSH or WEB link above.           ║
          ║  Each user gets their own tmux window via 'hub'.         ║
          ╚═══════════════════════════════════════════════════════════╝
          MOTD" Enter

          # ── Pre-create actor's personal window with hub running ────────────
          tmate -S "$SOCK" new-window -t "cloud" -n "u-$ACTOR"
          sleep 1
          tmate -S "$SOCK" send-keys -t "cloud:u-$ACTOR" \
            "source ~/.bashrc; hub" Enter

          # ── Print links to Actions log ─────────────────────────────────────
          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  ☁ CLOUD HUB OS — READY"
          echo "  SSH : $SSH_LINK"
          echo "  WEB : $WEB_LINK"
          echo "  User: $ACTOR"
          echo "  Repo: $REPO"
          echo "  Label: $SESSION_LABEL"
          echo "══════════════════════════════════════════════════════════"
          echo ""

          # ── Watchtower loop ────────────────────────────────────────────────
          # Monitors connections, logs joins/leaves, reprints link every 15m.
          # This loop IS the step that keeps the workflow alive.
          LAST_CLIENTS=0
          TIMER=0

          while true; do
            CLIENTS=$(tmate -S "$SOCK" list-clients 2>/dev/null | wc -l)

            if [ "$CLIENTS" != "$LAST_CLIENTS" ]; then
              if [ "$CLIENTS" -gt "$LAST_CLIENTS" ]; then
                echo "[$(date '+%H:%M:%S')] 🟢 USER JOINED  — active connections: $CLIENTS"
              else
                echo "[$(date '+%H:%M:%S')] 🔴 USER LEFT   — active connections: $CLIENTS"
              fi
              echo "  SSH: $SSH_LINK"
              echo "  WEB: $WEB_LINK"
              LAST_CLIENTS="$CLIENTS"
              TIMER=0
            fi

            if [ "$TIMER" -ge 900 ]; then
              echo "[$(date '+%H:%M:%S')] 🕒 15-min reminder:"
              echo "  SSH: $SSH_LINK"
              echo "  WEB: $WEB_LINK"
              TIMER=0
            fi

            sleep 5
            TIMER=$((TIMER + 5))
          done

      # ──────────────────────────────────────────────────────────────────────
      #  12. AUTO-SAVE ON EXIT
      #      Runs even if the session crashes or times out.
      #      Commits and pushes all dirty repos for every user.
      # ──────────────────────────────────────────────────────────────────────

      - name: Auto-Save All Repos on Exit
        if: always()
        run: |
          source /usr/local/lib/hubos/lib.sh 2>/dev/null || true
          echo "════ Auto-Save Triggered ════"

          SAVED=0
          FAILED=0

          for user_dir in "$WORKSPACES"/*/; do
            [ -d "$user_dir" ] || continue
            USER="$(basename "$user_dir")"

            for repo_dir in "$user_dir"*/; do
              [ -d "$repo_dir/.git" ] || continue
              NAME="$(basename "$repo_dir")"

              OUTPUT=$(hub_save_repo "$repo_dir" \
                "Auto-save: runner exit $(date -u '+%Y-%m-%d %H:%M UTC')" \
                "$USER" 2>&1)
              echo "$OUTPUT"

              if echo "$OUTPUT" | grep -q "✅"; then
                SAVED=$((SAVED + 1))
              fi
            done
          done

          echo ""
          echo "════ Auto-Save Complete — $SAVED repo(s) saved ════"
