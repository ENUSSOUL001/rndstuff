name: ☁ Cloud Hub OS

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Session label shown in the OS header'
        required: false
        default: 'Cloud Hub OS'
        type: string
      auto_commit:
        description: 'Auto-commit repos during session'
        required: false
        default: 'off'
        type: choice
        options:
          - 'off'
          - 'user-repos'
          - 'global'
      auto_commit_interval:
        description: 'Auto-commit interval in minutes'
        required: false
        default: '30'
        type: string

jobs:
  cloud-os:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix Global Node/NPM Path
        run: |
          NPM_BIN=$(npm config get prefix)/bin
          echo "$NPM_BIN" >> "$GITHUB_PATH"
          echo "export PATH=\"$NPM_BIN:\$PATH\"" >> ~/.bashrc
          echo "export PATH=\"$NPM_BIN:\$PATH\"" >> ~/.profile

      - name: Install System Packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            tmux \
            ttyd \
            dialog \
            jq \
            python3-pip \
            libsodium-dev \
            git \
            curl \
            wget \
            openssh-client \
            procps \
            iproute2 \
            screen
          pip install PyNaCl --break-system-packages -q

      - name: Install Cloudflared
        run: |
          curl -L \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Install Qwen Proxy
        run: |
          npm install -g qwen-proxy --silent --no-fund --no-audit

      - name: Install Hermes Agent via UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "export PATH=\"$HOME/.local/bin:\$PATH\"" >> ~/.bashrc
          git clone https://github.com/NousResearch/hermes-agent.git /opt/hermes-agent
          cd /opt/hermes-agent
          uv venv venv --python 3.11
          source venv/bin/activate
          uv pip install -e ".[all]" -q
          sudo ln -sf /opt/hermes-agent/venv/bin/hermes /usr/local/bin/hermes
          echo "export PATH=\"/opt/hermes-agent/venv/bin:\$PATH\"" >> ~/.bashrc

      - name: Build Secret Encryption Helper
        run: |
          sudo tee /usr/local/bin/hub_encrypt.py > /dev/null << 'PYEOF'
          #!/usr/bin/env python3
          import sys, base64
          from nacl import encoding, public
          if len(sys.argv) != 3:
              sys.exit(1)
          try:
              pk  = public.PublicKey(sys.argv[1].encode(), encoding.Base64Encoder())
              box = public.SealedBox(pk)
              enc = box.encrypt(sys.argv[2].encode())
              print(base64.b64encode(enc).decode())
          except Exception:
              sys.exit(1)
          PYEOF
          sudo chmod +x /usr/local/bin/hub_encrypt.py

      - name: Build Hub OS Shared Library
        run: |
          sudo mkdir -p /usr/local/lib/hubos
          sudo tee /usr/local/lib/hubos/lib.sh > /dev/null << 'LIBEOF'
          export HUB_DIR="$HOME/.crush_hub"
          export USERS_DIR="$HUB_DIR/users"
          export WORKSPACES="$HOME/workspaces"
          export HUB_CONF="$HUB_DIR/config"
          export TMUX_SOCK="/tmp/cloud.sock"
          export TMUX_SESSION="cloud"
          export SESSION_LABEL="${SESSION_LABEL:-Cloud Hub OS}"
          export PROXY_URL="http://localhost:8080"
          export TERM="${TERM:-screen-256color}"
          export COLORTERM="${COLORTERM:-truecolor}"
          mkdir -p "$USERS_DIR" "$WORKSPACES" "$HUB_CONF"

          hub_active_user() {
            cat "$HUB_CONF/active_user" 2>/dev/null \
              || ls -1t "$USERS_DIR" 2>/dev/null | head -n1 \
              || echo "default"
          }
          hub_set_user()    { echo "$1" > "$HUB_CONF/active_user"; }
          hub_user_pat()    { local u="${1:-$(hub_active_user)}"; cat "$USERS_DIR/$u/pat" 2>/dev/null; }
          hub_user_email()  { local u="${1:-$(hub_active_user)}"; cat "$USERS_DIR/$u/email" 2>/dev/null || echo "${u}@cloud.local"; }
          hub_current_repo(){ cat "$HUB_CONF/current_repo" 2>/dev/null; }
          hub_set_repo()    { echo "$1" > "$HUB_CONF/current_repo"; }
          hub_github_repo() { echo "${GITHUB_REPOSITORY:-$(cat "$HUB_CONF/github_repo" 2>/dev/null)}"; }
          hub_proxy_models(){ curl -sf "$PROXY_URL/v1/models" 2>/dev/null | jq -r '.data[].id' 2>/dev/null || echo ""; }
          hub_proxy_alive() { curl -sf "$PROXY_URL/v1/models" >/dev/null 2>&1; }
          hub_proxy_account_status() { grep -E 'acc[0-9]+:' ~/proxy.log 2>/dev/null | tail -5; }
          hub_proxy_any_invalid()    { grep -qiE 'acc[0-9]+: *(invalid|expired)' ~/proxy.log 2>/dev/null; }

          hub_tmux() { tmux -S "$TMUX_SOCK" "$@"; }

          hub_write_hermes_config() {
            local profile_dir="$1"
            mkdir -p "$profile_dir"
            cat > "$profile_dir/config.yaml" << 'CFGEOF'
          model:
            provider: custom
            base_url: http://localhost:8080/v1
            default: qwen3.6-plus
            context_length: 1048576
          compression:
            enabled: true
            threshold: 0.95
            target_ratio: 0.20
            protect_last_n: 50
          agent:
            max_turns: 10000
          tools:
            timeout: 21600
          api:
            timeout: 21600
          display:
            verbose: true
            skin: default
          CFGEOF
            printf 'OPENAI_API_KEY=sk-qwen-proxy-local\n' > "$profile_dir/.env"
          }

          hub_push_secret() {
            local sname="$1" sval="$2" pat="${3:-$(hub_user_pat)}" repo
            repo="$(hub_github_repo)"
            if [ -z "$pat" ]; then dialog --msgbox "ERROR: No PAT found." 7 52; return 1; fi
            if [ -z "$repo" ]; then dialog --msgbox "ERROR: GitHub repo not set." 7 52; return 1; fi
            if [ -z "$sname" ] || [ -z "$sval" ]; then dialog --msgbox "ERROR: Name or value empty." 5 45; return 1; fi
            local pk_json
            pk_json=$(curl -sf \
              -H "Authorization: Bearer $pat" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/actions/secrets/public-key" 2>/dev/null)
            if [ -z "$pk_json" ] || [ "$(echo "$pk_json" | jq -r '.key // empty')" = "" ]; then
              dialog --msgbox "ERROR: Could not fetch public key.\nCheck PAT has repo scope." 7 58; return 1
            fi
            local key_id key_val encrypted http_code
            key_id=$(echo "$pk_json" | jq -r '.key_id')
            key_val=$(echo "$pk_json" | jq -r '.key')
            encrypted=$(python3 /usr/local/bin/hub_encrypt.py "$key_val" "$sval" 2>/dev/null)
            if [ -z "$encrypted" ]; then dialog --msgbox "ERROR: Encryption failed." 7 52; return 1; fi
            http_code=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $pat" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/actions/secrets/$sname" \
              -d "{\"encrypted_value\":\"$encrypted\",\"key_id\":\"$key_id\"}" 2>/dev/null) || true
            case "$http_code" in
              201|204) dialog --msgbox "Secret '$sname' saved!\nAvailable on NEXT run." 8 52 ;;
              401|403) dialog --msgbox "ERROR $http_code: Permission denied.\nNeeds classic PAT, repo scope." 7 58 ;;
              404)     dialog --msgbox "ERROR 404: Repo '$repo' not found." 7 52 ;;
              *)       dialog --msgbox "ERROR: API returned HTTP $http_code." 6 52 ;;
            esac
          }

          hub_save_repo() {
            local repo_path="$1"
            local msg="${2:-Cloud session sync $(date -u '+%Y-%m-%d %H:%M UTC')}"
            local user="${3:-$(hub_active_user)}"
            [ -d "$repo_path/.git" ] || return 1
            (
              cd "$repo_path" || return 1
              git config user.name  "$user"
              git config user.email "$(hub_user_email "$user")"
              git add -A
              if git diff-index --quiet HEAD 2>/dev/null; then
                echo "  nothing to commit: $(basename "$repo_path")"
              else
                git commit -m "$msg" && git push && echo "  saved: $(basename "$repo_path")"
              fi
            ) 2>&1
          }

          hub_ensure_window() {
            local user="${1:-$(hub_active_user)}"
            local win_name="u-${user}"
            if hub_tmux has-session -t "$TMUX_SESSION" 2>/dev/null; then
              if ! hub_tmux list-windows -t "$TMUX_SESSION" -F '#W' 2>/dev/null | grep -qx "$win_name"; then
                hub_tmux new-window -t "$TMUX_SESSION" -n "$win_name" 2>/dev/null
              fi
              if [ -n "$TMUX" ]; then
                hub_tmux select-window -t "$TMUX_SESSION:$win_name" 2>/dev/null
              fi
            fi
          }

          hub_print_links() {
            local cf_web
            cf_web=$(cat "$HUB_CONF/cf_web" 2>/dev/null || echo "not ready")
            printf '\n'
            printf '  +------------------------------------------------------------------+\n'
            printf '  |  WEB ACCESS (Mobile/Desktop - works everywhere):                |\n'
            printf '  |  %s\n' "$cf_web"
            printf '  |                                                                  |\n'
            printf '  |  Password: value of GitHub secret PASS                         |\n'
            printf '  |                                                                  |\n'
            printf '  |  Tips:                                                           |\n'
            printf '  |  - Use landscape mode on mobile                                 |\n'
            printf '  |  - Pinch to zoom if text is small                              |\n'
            printf '  |  - Long-press to select/copy text                              |\n'
            printf '  +------------------------------------------------------------------+\n'
            printf '\n'
          }
          LIBEOF
          sudo chmod 644 /usr/local/lib/hubos/lib.sh

      - name: Build Hub OS Main Script
        run: |
          sudo tee /usr/local/bin/hub > /dev/null << 'HUBEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          CURRENT_USER="$(hub_active_user)"

          _read_multiline() {
            local title="$1" hint="$2"
            clear
            printf '+----------------------------------------------------------+\n'
            printf '|  %s\n' "$title"
            printf '+----------------------------------------------------------+\n'
            printf '%s\n\n  Paste below. Enter then Ctrl+D on blank line when done.\n\n' "$hint"
            cat
          }

          _confirm_secret() {
            local name="$1" value="$2"
            dialog --yesno \
              "Confirm push: $name\n\nPreview: ${value:0:80}\n\nLength: ${#value} chars\n\nProceed?" \
              14 66
          }

          _menu_secrets() {
            while true; do
              local SCHOICE
              SCHOICE=$(dialog --clear --title "Secret Manager" \
                --menu "Repo: $(hub_github_repo)" 20 66 7 \
                1 "Save PAT -> GH_SYNC_TOKEN" \
                2 "Save Qwen blob 1 -> CACHE_BLOB (paste JSON)" \
                3 "Save Qwen blob 2 -> CACHE_BLOB_2 (paste JSON)" \
                4 "Push a custom secret (single line)" \
                5 "Push a custom secret (multiline / JSON)" \
                6 "How does this work?" \
                7 "Back" \
                3>&1 1>&2 2>&3) || return
              case "$SCHOICE" in
                1)
                  local v confirm
                  v=$(dialog --clear --passwordbox "GitHub PAT (classic, repo+workflow scope):" 9 58 3>&1 1>&2 2>&3)
                  if [ -n "$v" ]; then
                    confirm=$(dialog --clear --passwordbox "Confirm PAT:" 9 58 3>&1 1>&2 2>&3)
                    if [ "$v" = "$confirm" ]; then hub_push_secret "GH_SYNC_TOKEN" "$v"
                    else dialog --msgbox "PAT entries do not match." 6 40; fi
                  fi
                  ;;
                2)
                  local v
                  v=$(_read_multiline "CACHE_BLOB" "  Paste ~/.qwen/oauth_creds_acc1.json content")
                  if [ -n "$v" ] && _confirm_secret "CACHE_BLOB" "$v"; then hub_push_secret "CACHE_BLOB" "$v"; fi
                  ;;
                3)
                  local v
                  v=$(_read_multiline "CACHE_BLOB_2" "  Paste ~/.qwen/oauth_creds_acc2.json content")
                  if [ -n "$v" ] && _confirm_secret "CACHE_BLOB_2" "$v"; then hub_push_secret "CACHE_BLOB_2" "$v"; fi
                  ;;
                4)
                  local sname sval confirm
                  sname=$(dialog --clear --inputbox "Secret name:" 8 52 3>&1 1>&2 2>&3)
                  if [ -n "$sname" ]; then
                    sval=$(dialog --clear --passwordbox "Value:" 8 52 3>&1 1>&2 2>&3)
                    if [ -n "$sval" ]; then
                      confirm=$(dialog --clear --passwordbox "Confirm value:" 8 52 3>&1 1>&2 2>&3)
                      if [ "$sval" = "$confirm" ]; then hub_push_secret "$sname" "$sval"
                      else dialog --msgbox "Values do not match." 6 36; fi
                    fi
                  fi
                  ;;
                5)
                  local sname sval
                  sname=$(dialog --clear --inputbox "Secret name:" 8 52 3>&1 1>&2 2>&3)
                  if [ -n "$sname" ]; then
                    sval=$(_read_multiline "Custom: $sname" "  Paste value below.")
                    if [ -n "$sval" ] && _confirm_secret "$sname" "$sval"; then hub_push_secret "$sname" "$sval"; fi
                  fi
                  ;;
                6)
                  dialog --msgbox \
                    "Secrets use LibSodium encryption, pushed via\nGitHub REST API. Available on NEXT run.\n\nNeeds classic PAT with repo scope.\nFine-grained PATs do not support secrets API.\n\nJSON blobs: paste full file content.\nCtrl+D on blank line = done." 13 58
                  ;;
                7) return ;;
              esac
            done
          }

          _menu_repos() {
            local PAT
            PAT="$(hub_user_pat "$CURRENT_USER")"
            if [ -z "$PAT" ]; then
              dialog --msgbox "No PAT for '$CURRENT_USER'.\nUse option 2 to add or switch user." 7 52; return
            fi
            dialog --infobox "Fetching repositories..." 4 48
            local REPOS
            REPOS=$(curl -sf \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/repos?per_page=100&sort=updated&affiliation=owner,collaborator" \
              | jq -r '.[].full_name' 2>/dev/null)
            if [ -z "$REPOS" ]; then
              dialog --msgbox "Failed to fetch repos.\nCheck PAT has repo scope." 7 52; return
            fi
            local OPTS=()
            while IFS= read -r r; do OPTS+=("$r" "->"); done <<< "$REPOS"
            local REPO_CHOICE
            REPO_CHOICE=$(dialog --clear --title "Your Repositories" \
              --menu "Select to clone or open:" 24 66 16 \
              "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
            local SHORT="${REPO_CHOICE##*/}"
            local REPO_DIR="$WORKSPACES/$CURRENT_USER/$SHORT"
            if [ ! -d "$REPO_DIR/.git" ]; then
              dialog --infobox "Cloning $REPO_CHOICE ..." 4 50
              if ! git clone "https://$CURRENT_USER:$PAT@github.com/$REPO_CHOICE.git" \
                  "$REPO_DIR" >/dev/null 2>&1; then
                dialog --msgbox "Clone failed. Check PAT access." 7 48; return
              fi
              git -C "$REPO_DIR" config user.name  "$CURRENT_USER"
              git -C "$REPO_DIR" config user.email "$(hub_user_email "$CURRENT_USER")"
            fi
            hub_set_repo "$REPO_DIR"
            clear
            printf '\e[1;32m'
            printf '+----------------------------------------------------------+\n'
            printf '|  Connected: %-42s |\n' "$SHORT"
            printf '|  Path:      %-42s |\n' "$REPO_DIR"
            printf '+----------------------------------------------------------+\n'
            printf '|  h             -> Hermes AI (runs in this dir)          |\n'
            printf '|  cdw           -> jump to this repo root                |\n'
            printf '|  go [name]     -> switch to another repo                |\n'
            printf '|  save [msg]    -> commit + push this repo               |\n'
            printf '|  override [m]  -> force push (--allow-empty)            |\n'
            printf '|  commit [msg]  -> commit all repos (current user)       |\n'
            printf '|  gcommit [msg] -> commit all repos (all users)          |\n'
            printf '|  gsave [msg]   -> global save: repos + system state     |\n'
            printf '|  secrets       -> manage GitHub secrets                 |\n'
            printf '|  links         -> show SSH / web links                  |\n'
            printf '|  hub           -> back to main menu                     |\n'
            printf '+----------------------------------------------------------+\n'
            printf '\e[0m\n'
            bash --rcfile <(cat ~/.bashrc; echo "cd '$REPO_DIR'")
          }

          _menu_users() {
            while true; do
              local USERS_LIST OPTS=() U_CHOICE
              USERS_LIST=$(ls -1 "$USERS_DIR" 2>/dev/null)
              while IFS= read -r u; do
                [ -n "$u" ] && OPTS+=("$u" "$([ "$u" = "$CURRENT_USER" ] && echo 'active' || echo 'switch')")
              done <<< "$USERS_LIST"
              OPTS+=("__add__" "+ Add new user")
              U_CHOICE=$(dialog --clear --title "User Profiles" \
                --menu "Active: $CURRENT_USER" 18 54 10 \
                "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
              if [ "$U_CHOICE" = "__add__" ]; then
                local NEW_USER NEW_PAT NEW_EMAIL PROFILE
                NEW_USER=$(dialog --clear --inputbox "GitHub Username:" 8 48 3>&1 1>&2 2>&3)
                [ -z "$NEW_USER" ] && return
                NEW_PAT=$(dialog --clear --passwordbox \
                  "GitHub PAT (repo + workflow, classic):" 9 54 3>&1 1>&2 2>&3)
                [ -z "$NEW_PAT" ] && return
                dialog --infobox "Verifying credentials..." 4 40
                PROFILE=$(curl -sf -H "Authorization: token $NEW_PAT" \
                  https://api.github.com/user 2>/dev/null)
                if [ -z "$PROFILE" ] || [ "$(echo "$PROFILE" | jq -r '.login // empty')" = "" ]; then
                  dialog --msgbox "ERROR: Invalid credentials." 6 40; return
                fi
                NEW_EMAIL=$(echo "$PROFILE" | jq -r '.email // empty')
                if [ -z "$NEW_EMAIL" ] || [ "$NEW_EMAIL" = "null" ]; then
                  NEW_EMAIL=$(dialog --clear --inputbox "Email (not public):" 8 48 3>&1 1>&2 2>&3)
                  [ -z "$NEW_EMAIL" ] && NEW_EMAIL="${NEW_USER}@cloud.local"
                fi
                mkdir -p "$USERS_DIR/$NEW_USER"
                printf '%s' "$NEW_PAT"   > "$USERS_DIR/$NEW_USER/pat"
                printf '%s' "$NEW_EMAIL" > "$USERS_DIR/$NEW_USER/email"
                CURRENT_USER="$NEW_USER"
                hub_set_user "$CURRENT_USER"
                hub_ensure_window "$CURRENT_USER"
                if dialog --yesno "User '$NEW_USER' added!\nSave PAT as GH_SYNC_TOKEN?" 8 52; then
                  hub_push_secret "GH_SYNC_TOKEN" "$NEW_PAT" "$NEW_PAT"
                fi
              elif [ -n "$U_CHOICE" ]; then
                CURRENT_USER="$U_CHOICE"
                hub_set_user "$CURRENT_USER"
                hub_ensure_window "$CURRENT_USER"
                dialog --msgbox "Switched to '$CURRENT_USER'" 5 36
                return
              fi
            done
          }

          _reauth_account() {
            local acc="$1" secret_name="$2"
            while true; do
              clear
              printf '+----------------------------------------------------------+\n'
              printf '|  Reauth: %s -> %s\n' "$acc" "$secret_name"
              printf '+----------------------------------------------------------+\n'
              printf '  URL and QR code will appear. Open in browser to auth.\n'
              printf '  Terminal waits. Ctrl+C to cancel.\n\n'
              qwen-proxy auth add "$acc"
              local result=$?
              echo ""
              if [ $result -eq 0 ]; then
                local creds_file="$HOME/.qwen/oauth_creds_${acc}.json"
                if [ -f "$creds_file" ]; then
                  if dialog --yesno \
                    "Auth OK for $acc!\n\nPush to '$secret_name' in GitHub Secrets?" 9 54; then
                    hub_push_secret "$secret_name" "$(cat "$creds_file")"
                  fi
                else
                  dialog --msgbox "Auth succeeded but cred file missing:\n$creds_file" 8 58
                fi
                break
              else
                if dialog --yesno "Auth failed or cancelled. Retry?" 7 40; then continue
                else break; fi
              fi
            done
          }

          _menu_reauth() {
            local SELECTED
            SELECTED=$(dialog --clear --title "Reauth Proxy Accounts" \
              --checklist "Select accounts:" 12 58 3 \
              "acc1" "Account 1  -> CACHE_BLOB" "on" \
              "acc2" "Account 2  -> CACHE_BLOB_2" "on" \
              3>&1 1>&2 2>&3) || return
            SELECTED=$(printf '%s' "$SELECTED" | tr -d '"' | tr ' ' '\n' | grep -v '^$')
            [ -z "$SELECTED" ] && dialog --msgbox "No accounts selected." 5 32 && return
            while IFS= read -r acc; do
              [ -z "$acc" ] && continue
              local sname="CACHE_BLOB"
              [ "$acc" = "acc2" ] && sname="CACHE_BLOB_2"
              _reauth_account "$acc" "$sname"
            done <<< "$SELECTED"
            dialog --msgbox "Reauth done." 5 30
          }

          hub_ensure_window "$CURRENT_USER"

          while true; do
            CURRENT_USER="$(hub_active_user)"
            hub_print_links
            CHOICE=$(dialog --clear \
              --title "Cloud Hub OS  |  $SESSION_LABEL" \
              --menu "User: $CURRENT_USER  |  $(date '+%a %H:%M')  |  type 'hub' anytime" \
              26 66 11 \
              1  "Select / Clone Repository" \
              2  "Switch / Add User" \
              3  "Manage GitHub Secrets" \
              4  "Save All Open Repos" \
              5  "Global Save (repos + system state)" \
              6  "Show Access Links" \
              7  "Tmux Window List" \
              8  "Proxy Status and Models" \
              9  "Reauth Proxy Accounts" \
              10 "Drop to Shell" \
              11 "Exit Hub" \
              3>&1 1>&2 2>&3)
            [ $? -ne 0 ] && CHOICE=10
            case "$CHOICE" in
              1)  _menu_repos ;;
              2)  _menu_users ;;
              3)  _menu_secrets ;;
              4)
                dialog --infobox "Saving all repos..." 4 36
                local results=""
                for repo_dir in "$WORKSPACES/$CURRENT_USER"/*/; do
                  [ -d "$repo_dir/.git" ] || continue
                  local out
                  out=$(hub_save_repo "$repo_dir" "Manual save" "$CURRENT_USER")
                  results+="$out\n"
                done
                dialog --msgbox "Done:\n\n${results:-No repos found.}" 14 56
                ;;
              5)
                clear
                gsave "Manual global save $(date -u '+%Y-%m-%d %H:%M UTC')"
                read -rp "Press Enter to return..." _dummy
                ;;
              6)
                clear
                hub_print_links
                read -rp "Press Enter to return..." _dummy
                ;;
              7)
                clear
                hub_tmux list-windows -t "$TMUX_SESSION" 2>/dev/null \
                  || echo "(tmux session not found)"
                read -rp "Press Enter to return..." _dummy
                ;;
              8)
                clear
                echo "=== Proxy Current Status ==="
                if hub_proxy_alive; then
                  echo "Running: YES  ($PROXY_URL/v1)"
                  echo ""
                  echo "Models:"
                  hub_proxy_models | sed 's/^/  - /'
                  echo ""
                  echo "Account status:"
                  hub_proxy_account_status | sed 's/^/  /'
                  hub_proxy_any_invalid && echo "" && echo "WARNING: Invalid account(s). Use option 9."
                else
                  echo "Running: NO"
                fi
                echo ""
                echo "=== Recent Proxy Log ==="
                tail -25 ~/proxy.log 2>/dev/null || echo "(no log)"
                echo ""
                read -rp "Press Enter to return..." _dummy
                ;;
              9)  _menu_reauth ;;
              10)
                clear
                cat << 'SHELLTIP'
          +------------------------------------------------------------------+
          |  h             -> Hermes AI (runs in current dir)               |
          |  cdw           -> cd to current repo root                       |
          |  go [name]     -> switch repos (fuzzy or picker)                |
          |  save [msg]    -> commit + push current repo                    |
          |  override [m]  -> force push (--allow-empty)                    |
          |  commit [msg]  -> commit all repos (current user)               |
          |  gcommit [msg] -> commit all repos (all users)                  |
          |  gsave [msg]   -> global save: repos + system state             |
          |  secrets       -> push secrets to GitHub                        |
          |  links         -> show access links                             |
          |  hub           -> back to main menu                             |
          |                                                                  |
          |  Tmux Shortcuts:                                                  |
          |  Ctrl+B %      split pane vertically                            |
          |  Ctrl+B "      split pane horizontally                          |
          |  Ctrl+B arrow  navigate between panes                           |
          |  Ctrl+B [      enter scroll/copy mode                           |
          |  q             exit scroll mode                                 |
          +------------------------------------------------------------------+
          SHELLTIP
                break
                ;;
              11)
                clear
                echo "Session stays alive. Web link still works."
                exit 0
                ;;
            esac
          done
          HUBEOF
          sudo chmod +x /usr/local/bin/hub

      - name: Build Hermes Brain Router (h command)
        run: |
          sudo tee /usr/local/bin/h > /dev/null << 'HEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          export PATH="$HOME/.local/bin:/opt/hermes-agent/venv/bin:$PATH"
          WORK_DIR="$PWD"
          REPO_NAME=$(basename "$WORK_DIR")
          BLOCKED="workspace workspaces runner home tmp"
          for _b in $BLOCKED; do
            [ "$REPO_NAME" = "$_b" ] && \
              printf 'ERROR: cd into a repo first.\nCurrent: %s\nUse: go <n>  or  cdw\n' "$WORK_DIR" && exit 1
          done
          if ! hub_proxy_alive; then
            printf 'WARNING: Proxy not responding. API calls may fail.\n'
          fi
          hub_write_hermes_config "$HOME/.hermes"
          export OPENAI_API_KEY="sk-qwen-proxy-local"
          export OPENAI_BASE_URL="$PROXY_URL/v1"
          printf 'Hermes  |  [%s]\ncwd:    %s\nproxy:  %s/v1\n/exit or Ctrl+D to return\n\n' \
            "$REPO_NAME" "$WORK_DIR" "$PROXY_URL"
          cd "$WORK_DIR" && exec hermes "$@"
          HEOF
          sudo chmod +x /usr/local/bin/h

      - name: Build Helper Tools
        run: |
          sudo tee /usr/local/bin/save > /dev/null << 'SAVEEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          TARGET="${HUB_REPO_OVERRIDE:-$(hub_current_repo)}"
          TARGET="${TARGET:-$(pwd)}"
          MSG="${*:-Cloud session save $(date -u '+%Y-%m-%d %H:%M UTC')}"
          if [ ! -d "$TARGET/.git" ]; then printf 'No git repo at: %s\n' "$TARGET"; exit 1; fi
          USER="$(hub_active_user)"
          cd "$TARGET" || exit 1
          git config user.name  "$USER"
          git config user.email "$(hub_user_email "$USER")"
          git add -A
          if git diff-index --quiet HEAD 2>/dev/null; then
            printf 'Nothing to commit: %s\n' "$(basename "$TARGET")"
          else
            git commit -m "$MSG" && git push && printf 'Saved: %s\n' "$TARGET"
          fi
          SAVEEOF
          sudo chmod +x /usr/local/bin/save

          sudo tee /usr/local/bin/override > /dev/null << 'OVEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          TARGET="$(hub_current_repo)"
          TARGET="${TARGET:-$(pwd)}"
          MSG="${*:-Override commit $(date -u '+%Y-%m-%d %H:%M UTC')}"
          if [ ! -d "$TARGET/.git" ]; then printf 'No git repo at: %s\n' "$TARGET"; exit 1; fi
          USER="$(hub_active_user)"
          cd "$TARGET" || exit 1
          git config user.name  "$USER"
          git config user.email "$(hub_user_email "$USER")"
          git add -A
          git commit --allow-empty -m "$MSG"
          git push --force
          printf 'Force pushed: %s\n' "$TARGET"
          OVEOF
          sudo chmod +x /usr/local/bin/override

          sudo tee /usr/local/bin/commit > /dev/null << 'COMMITEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          USER="$(hub_active_user)"
          MSG="${*:-Manual commit $(date -u '+%Y-%m-%d %H:%M UTC')}"
          printf 'Committing repos for: %s\n' "$USER"
          for repo_dir in "$WORKSPACES/$USER"/*/; do
            [ -d "$repo_dir/.git" ] || continue
            hub_save_repo "$repo_dir" "$MSG" "$USER"
          done
          COMMITEOF
          sudo chmod +x /usr/local/bin/commit

          sudo tee /usr/local/bin/gcommit > /dev/null << 'GCOMMITEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          MSG="${*:-Global commit $(date -u '+%Y-%m-%d %H:%M UTC')}"
          printf 'Global commit across all users\n'
          for user_dir in "$WORKSPACES"/*/; do
            [ -d "$user_dir" ] || continue
            USER="$(basename "$user_dir")"
            for repo_dir in "$user_dir"*/; do
              [ -d "$repo_dir/.git" ] || continue
              hub_save_repo "$repo_dir" "$MSG" "$USER"
            done
          done
          GCOMMITEOF
          sudo chmod +x /usr/local/bin/gcommit

          sudo tee /usr/local/bin/gsave > /dev/null << 'GSAVEEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          MSG="${*:-Global save $(date -u '+%Y-%m-%d %H:%M UTC')}"
          printf 'gsave: all repos + system state\n\n'

          for user_dir in "$WORKSPACES"/*/; do
            [ -d "$user_dir" ] || continue
            USER="$(basename "$user_dir")"
            for repo_dir in "$user_dir"*/; do
              [ -d "$repo_dir/.git" ] || continue
              hub_save_repo "$repo_dir" "$MSG" "$USER"
            done
          done

          CURRENT_REPO="$(hub_current_repo)"
          if [ -z "$CURRENT_REPO" ] || [ ! -d "$CURRENT_REPO/.git" ]; then
            for user_dir in "$WORKSPACES"/*/; do
              for repo_dir in "$user_dir"*/; do
                if [ -d "$repo_dir/.git" ]; then CURRENT_REPO="$repo_dir"; break 2; fi
              done
            done
          fi

          if [ -n "$CURRENT_REPO" ] && [ -d "$CURRENT_REPO/.git" ]; then
            STATE_DIR="$CURRENT_REPO/.hub-state"
            mkdir -p "$STATE_DIR/hermes" "$STATE_DIR/scripts"
            cp ~/.hermes/config.yaml "$STATE_DIR/hermes/" 2>/dev/null || true
            cp ~/.hermes/.env        "$STATE_DIR/hermes/" 2>/dev/null || true
            cp -r ~/.hermes/skills   "$STATE_DIR/hermes/" 2>/dev/null || true
            for f in hub h save override commit gcommit gsave secrets links; do
              cp "/usr/local/bin/$f" "$STATE_DIR/scripts/" 2>/dev/null || true
            done
            cp /usr/local/lib/hubos/lib.sh "$STATE_DIR/scripts/" 2>/dev/null || true
            USER="$(hub_active_user)"
            hub_save_repo "$CURRENT_REPO" "$MSG (+ system state)" "$USER"
          else
            printf 'No repo found. Clone a repo via hub first to save system state.\n'
          fi
          GSAVEEOF
          sudo chmod +x /usr/local/bin/gsave

          sudo tee /usr/local/bin/secrets > /dev/null << 'SECEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          _push_custom() {
            local SNAME SVAL
            SNAME=$(dialog --clear --inputbox "Secret name:" 8 50 3>&1 1>&2 2>&3) || return
            SVAL=$(dialog --clear --passwordbox "Secret value:" 8 50 3>&1 1>&2 2>&3) || return
            [ -n "$SNAME" ] && [ -n "$SVAL" ] && hub_push_secret "$SNAME" "$SVAL"
          }
          while true; do
            CHOICE=$(dialog --clear --title "Secret Manager" \
              --menu "Repo: $(hub_github_repo)" 14 60 5 \
              1 "Push GH_SYNC_TOKEN (PAT)" \
              2 "Push CACHE_BLOB" \
              3 "Push CACHE_BLOB_2" \
              4 "Push custom secret" \
              5 "Exit" \
              3>&1 1>&2 2>&3) || break
            case "$CHOICE" in
              1) v=$(dialog --clear --passwordbox "PAT:" 8 50 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "GH_SYNC_TOKEN" "$v" ;;
              2) v=$(dialog --clear --inputbox "CACHE_BLOB:" 10 60 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "CACHE_BLOB" "$v" ;;
              3) v=$(dialog --clear --inputbox "CACHE_BLOB_2:" 10 60 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "CACHE_BLOB_2" "$v" ;;
              4) _push_custom ;;
              5) break ;;
            esac
          done
          SECEOF
          sudo chmod +x /usr/local/bin/secrets

          sudo tee /usr/local/bin/links > /dev/null << 'LEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          hub_print_links
          LEOF
          sudo chmod +x /usr/local/bin/links

          cat >> ~/.bashrc << 'RCEOF'

          export TERM="${TERM:-screen-256color}"
          export COLORTERM="${COLORTERM:-truecolor}"
          source /usr/local/lib/hubos/lib.sh 2>/dev/null

          cdw() {
            local REPO
            REPO="$(hub_current_repo)"
            if [ -z "$REPO" ] || [ ! -d "$REPO" ]; then
              printf 'No repo set. Use hub -> Select Repository or: go <n>\n'; return 1
            fi
            cd "$REPO" && printf '%s\n' "$REPO"
          }

          go() {
            local USER WORKDIR TARGET CHOICE OPTS=()
            USER="$(hub_active_user)"
            WORKDIR="$WORKSPACES/$USER"
            if [ -n "$1" ]; then
              TARGET=$(find "$WORKDIR" -maxdepth 1 -type d -name "*${1}*" 2>/dev/null | head -1)
              if [ -z "$TARGET" ]; then
                printf 'No repo matching "%s"\n' "$1"
                ls -1 "$WORKDIR" 2>/dev/null || printf '(none cloned yet)\n'
                return 1
              fi
            else
              while IFS= read -r d; do
                [ -d "$d/.git" ] && OPTS+=("$(basename "$d")" "-> $d")
              done < <(find "$WORKDIR" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort)
              if [ ${#OPTS[@]} -eq 0 ]; then
                printf 'No repos. Clone via hub option 1.\n'; return 1
              fi
              CHOICE=$(dialog --clear --title "Go To Repo" \
                --menu "Select:" 20 64 14 "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
              TARGET="$WORKDIR/$CHOICE"
            fi
            hub_set_repo "$TARGET"
            cd "$TARGET" && printf '%s\n' "$TARGET"
          }
          RCEOF

      - name: Configure Pre-loaded User
        run: |
          source /usr/local/lib/hubos/lib.sh
          mkdir -p "$USERS_DIR/${{ github.actor }}"
          printf '%s' '${{ secrets.GH_SYNC_TOKEN }}' > "$USERS_DIR/${{ github.actor }}/pat"
          printf '%s' '${{ github.actor }}@cloud.local' > "$USERS_DIR/${{ github.actor }}/email"
          hub_set_user "${{ github.actor }}"
          printf '%s' '${{ github.repository }}' > "$HUB_CONF/github_repo"

      - name: Setup Qwen Proxy Credentials
        run: |
          mkdir -p ~/.qwen
          printf '%s' '${{ secrets.CACHE_BLOB }}'   > ~/.qwen/oauth_creds_acc1.json
          printf '%s' '${{ secrets.CACHE_BLOB_2 }}' > ~/.qwen/oauth_creds_acc2.json

      - name: Configure Hermes Brain
        run: |
          source /usr/local/lib/hubos/lib.sh
          hub_write_hermes_config "$HOME/.hermes"

      - name: Configure Tmux Appearance
        run: |
          cat > ~/.tmux.conf << 'EOF'
          set -g status-style        bg=colour235,fg=colour250
          set -g status-left         "#[fg=colour82,bold] Cloud OS #[fg=colour240]| "
          set -g status-right        "#[fg=colour240]%a %d %H:%M  #[fg=colour82]#{session_windows}w "
          set -g status-left-length  24
          set -g status-right-length 30
          set -g window-status-format         " #I:#W "
          set -g window-status-current-format "#[fg=colour82,bold,bg=colour238] #I:#W* "
          set -g window-status-separator      ""
          set -g mouse on
          set -g history-limit 50000
          set -g base-index 1
          set -g pane-base-index 1
          set -g default-terminal "screen-256color"
          set -g terminal-overrides ',xterm-256color:Tc'
          set -g escape-time 10
          set -g renumber-windows on
          set -g allow-rename off
          bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -e"
          bind r source-file ~/.tmux.conf \; display "Config reloaded"
          bind H run-shell "hub"
          bind S run-shell "save"
          bind L run-shell "links"
          EOF

      - name: Start Qwen Proxy and Verify
        run: |
          export QWEN_CODE_AUTH_USE=false
          qwen-proxy serve --headless > ~/proxy.log 2>&1 &
          PROXY_PID=$!
          echo "Qwen proxy PID $PROXY_PID -- waiting..."
          sleep 8
          echo ""
          echo "================== Proxy Startup Log =================="
          cat ~/proxy.log
          echo "======================================================="
          echo ""
          PROXY_OK=false
          for attempt in 1 2 3 4 5 6; do
            if curl -sf http://localhost:8080/v1/models >/dev/null 2>&1; then
              PROXY_OK=true; break
            fi
            echo "Attempt $attempt: not ready, waiting 5s..."
            sleep 5
            tail -10 ~/proxy.log
          done
          if $PROXY_OK; then
            echo "Proxy responding at http://localhost:8080/v1"
            echo "Models:"
            curl -sf http://localhost:8080/v1/models \
              | jq -r '.data[].id' 2>/dev/null | sed 's/^/  - /'
            echo "Accounts:"
            grep -E 'acc[0-9]+:' ~/proxy.log | tail -5 | sed 's/^/  /'
          else
            echo "WARNING: Proxy did not respond after 6 attempts."
          fi
          tail -n +1 -f ~/proxy.log &

      - name: Launch tmux, ttyd, Cloudflare and Hub OS
        env:
          SESSION_LABEL: ${{ inputs.label || 'Cloud Hub OS' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AUTO_COMMIT: ${{ inputs.auto_commit || 'off' }}
          AUTO_COMMIT_INTERVAL: ${{ inputs.auto_commit_interval || '30' }}
          SESSION_PASS: ${{ secrets.PASS }}
        run: |
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          SESSION_LABEL="${SESSION_LABEL:-Cloud Hub OS}"
          SESSION_START=$(date +%s)
          WATCHER_PID=""
          AUTO_COMMIT_PID=""

          if ! echo "$AUTO_COMMIT_INTERVAL" | grep -qE '^[0-9]+$'; then
            AUTO_COMMIT_INTERVAL=30
          fi

          source /usr/local/lib/hubos/lib.sh

          log() { printf '[%s] [%-9s] %s\n' "$(date -u '+%H:%M:%S')" "$1" "${*:2}"; }

          _compute_shutdown_at() {
            local total_files=0
            for user_dir in "$WORKSPACES"/*/; do
              [ -d "$user_dir" ] || continue
              for repo_dir in "$user_dir"*/; do
                [ -d "$repo_dir/.git" ] || continue
                local n
                n=$(git -C "$repo_dir" diff --name-only HEAD 2>/dev/null | wc -l)
                total_files=$((total_files + n))
              done
            done
            local extra=$(( total_files / 20 * 60 ))
            [ "$extra" -gt 1200 ] && extra=1200
            echo $(( SESSION_START + 21000 - extra ))
          }

          _write_summary() {
            local status="$1"
            local UPTIME_MIN=$(( ($(date +%s) - SESSION_START) / 60 ))
            {
              echo "## ☁ Cloud Hub OS — Session Summary"
              echo "| Field | Value |"
              echo "|---|---|"
              echo "| Status | $status |"
              echo "| Uptime | ${UPTIME_MIN}min |"
              echo "| Actor | \`$ACTOR\` |"
              echo "| Repo | \`$REPO\` |"
              echo "| Auto-commit | $AUTO_COMMIT every ${AUTO_COMMIT_INTERVAL}min |"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          _do_shutdown_commit() {
            log "SHUTDOWN" "Running final global commit before exit..."
            local OUT
            OUT=$(gcommit "Auto-save on session shutdown $(date -u '+%Y-%m-%d %H:%M UTC')" 2>&1)
            while IFS= read -r line; do log "SHUTDOWN" "$line"; done <<< "$OUT"
          }

          _signal_handler() {
            log "KILLED" "GitHub cancelled or timed out the job"
            _do_shutdown_commit
            kill "$WATCHER_PID" 2>/dev/null || true
            kill "$AUTO_COMMIT_PID" 2>/dev/null || true
            _write_summary "Killed by GitHub (timeout or manual cancel)"
            exit 0
          }
          trap '_signal_handler' SIGTERM SIGINT

          cat >> ~/.bashrc << ENVEOF
          export SESSION_LABEL="$SESSION_LABEL"
          export GITHUB_REPOSITORY="$REPO"
          export TERM="screen-256color"
          export COLORTERM="truecolor"
          ENVEOF

          # Start tmux session
          tmux -S "$TMUX_SOCK" new-session -d -s "$TMUX_SESSION" -n "monitor"
          tmux -S "$TMUX_SOCK" new-window -t "$TMUX_SESSION" -n "links"
          tmux -S "$TMUX_SOCK" new-window -t "$TMUX_SESSION" -n "u-$ACTOR"
          sleep 1

          tmux -S "$TMUX_SOCK" send-keys -t "$TMUX_SESSION:monitor" \
            "tail -f ~/proxy.log" Enter

          tmux -S "$TMUX_SOCK" send-keys -t "$TMUX_SESSION:links" \
            "source ~/.bashrc; while true; do clear; hub_print_links; echo 'Auto-refreshes every 30s'; sleep 30; done" Enter

          tmux -S "$TMUX_SOCK" send-keys -t "$TMUX_SESSION:u-$ACTOR" \
            "export SESSION_LABEL='$SESSION_LABEL' GITHUB_REPOSITORY='$REPO'; source ~/.bashrc; clear; while true; do hub; done" Enter

          tmux -S "$TMUX_SOCK" select-window -t "$TMUX_SESSION:u-$ACTOR"

          sleep 2

          # Start ttyd with mobile-friendly settings
          if [ -n "$SESSION_PASS" ]; then
            ttyd --writable \
              --port 7681 \
              --interface 127.0.0.1 \
              --credential "user:$SESSION_PASS" \
              --terminal-type "xterm-256color" \
              --client-option "rendererType=canvas" \
              --client-option "disableLeaveAlert=true" \
              tmux -S "$TMUX_SOCK" attach -t "$TMUX_SESSION" \
              > ~/ttyd.log 2>&1 &
          else
            ttyd --writable \
              --port 7681 \
              --interface 127.0.0.1 \
              --terminal-type "xterm-256color" \
              --client-option "rendererType=canvas" \
              --client-option "disableLeaveAlert=true" \
              tmux -S "$TMUX_SOCK" attach -t "$TMUX_SESSION" \
              > ~/ttyd.log 2>&1 &
          fi
          sleep 3

          # Start cloudflared tunnel
          cloudflared tunnel --url http://localhost:7681 \
            --no-autoupdate --http2-origin > ~/cf.log 2>&1 &

          CF_URL=""
          for i in $(seq 1 30); do
            CF_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/cf.log | head -n1)
            [ -n "$CF_URL" ] && break
            sleep 1
          done
          printf '%s' "${CF_URL:-unavailable}" > "$HUB_CONF/cf_web"

          SHUTDOWN_AT=$(_compute_shutdown_at)

          log "START" "Session: $SESSION_LABEL | Actor: $ACTOR | Repo: $REPO"
          log "START" "Auto-commit: $AUTO_COMMIT every ${AUTO_COMMIT_INTERVAL}min"
          log "START" "Graceful shutdown at 350min (or earlier for large repos)"
          log "LINK"  "WEB (works on mobile): ${CF_URL:-check cf.log}"
          log "INFO"  "WEB password = value of GitHub secret PASS"
          log "INFO"  "Use landscape mode on mobile for best experience"
          log "INFO"  "Links window: Ctrl+B 2 (auto-refreshes every 30s)"
          log "INFO"  "Scroll: Ctrl+B [  then arrows/PgUp  then q to exit"
          echo ""

          (
            while true; do
              sleep 90
              if ! tmux -S "$TMUX_SOCK" list-sessions >/dev/null 2>&1; then
                log "TMUX" "Session lost -- restarting..."
                tmux -S "$TMUX_SOCK" new-session -d -s "$TMUX_SESSION" \
                  -n "u-$ACTOR" 2>/dev/null || true
                sleep 3
                log "TMUX" "Session restarted"
              fi
            done
          ) &
          WATCHER_PID=$!

          if [ "$AUTO_COMMIT" != "off" ]; then
            (
              INTERVAL_SECS=$(( AUTO_COMMIT_INTERVAL * 60 ))
              while true; do
                sleep "$INTERVAL_SECS"
                AMSG="Auto-commit: $(date -u '+%Y-%m-%d %H:%M UTC')"
                if [ "$AUTO_COMMIT" = "global" ]; then
                  OUT=$(gcommit "$AMSG" 2>&1)
                else
                  OUT=$(commit "$AMSG" 2>&1)
                fi
                while IFS= read -r line; do log "AUTOCOMMIT" "$line"; done <<< "$OUT"
              done
            ) &
            AUTO_COMMIT_PID=$!
            log "AUTOCOMMIT" "Started: mode=$AUTO_COMMIT interval=${AUTO_COMMIT_INTERVAL}min"
          fi

          LAST_CLIENTS=0
          TIMER=0

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$SHUTDOWN_AT" ]; then
              log "SHUTDOWN" "350min limit reached -- graceful exit"
              _do_shutdown_commit
              kill "$WATCHER_PID" 2>/dev/null || true
              kill "$AUTO_COMMIT_PID" 2>/dev/null || true
              _write_summary "Graceful shutdown (350min limit)"
              break
            fi

            if [ "$TIMER" -ge 900 ]; then
              UPTIME_MIN=$(( (NOW - SESSION_START) / 60 ))
              MINS_LEFT=$(( (SHUTDOWN_AT - NOW) / 60 ))
              PROXY_STATUS="down"
              hub_proxy_alive && PROXY_STATUS="up"
              SHUTDOWN_AT=$(_compute_shutdown_at)
              FRESH_URL=$(cat "$HUB_CONF/cf_web" 2>/dev/null || echo "$CF_URL")
              log "HEARTBEAT" "uptime: ${UPTIME_MIN}min | left: ~${MINS_LEFT}min | proxy: $PROXY_STATUS"
              log "HEARTBEAT" "WEB: $FRESH_URL"
              hub_proxy_any_invalid && log "WARN" "Proxy account(s) INVALID -- use hub option 9"
              TIMER=0
            fi

            sleep 5
            TIMER=$((TIMER + 5))
          done

          log "END" "Watchtower done -- auto-save step next"

      - name: Auto-Save All Repos on Exit
        if: always()
        run: |
          source /usr/local/lib/hubos/lib.sh 2>/dev/null || true
          echo "Auto-Save triggered"
          for user_dir in "$WORKSPACES"/*/; do
            [ -d "$user_dir" ] || continue
            USER="$(basename "$user_dir")"
            for repo_dir in "$user_dir"*/; do
              [ -d "$repo_dir/.git" ] || continue
              hub_save_repo "$repo_dir" \
                "Auto-save: runner exit $(date -u '+%Y-%m-%d %H:%M UTC')" \
                "$USER"
            done
          done
          echo "Auto-Save complete"
