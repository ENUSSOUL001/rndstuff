name: Node.js CI Build

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang python3-pip -qq
          npm install -g @qwen-code/qwen-code typescript eslint
          echo -e '#!/bin/bash\ncd /home/runner/work/rndstuff/rndstuff/workspace && tmux new-session -A -s brain' | sudo tee /usr/local/bin/rig
          sudo chmod +x /usr/local/bin/rig

      - run: |
          git clone https://${{ secrets.GH_SYNC_TOKEN }}@github.com/ENUSSOUL001/Hm.git workspace

      - run: |
          mkdir -p ~/.qwen
          echo '${{ secrets.CACHE_BLOB }}' > ~/.qwen/oauth_creds.json

      - uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          limit-access-to-actor: true

      - run: |
          sleep 21300
