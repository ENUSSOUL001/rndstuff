name: Node.js CI Build
on: [workflow_dispatch]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System & Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang python3-pip tmux tmate dialog jq -qq
          npm install -g @charmland/crush qwen-proxy

      - name: Build Crush Hub OS
        run: |
          cat << 'EOF' | sudo tee /usr/local/bin/hub
          #!/bin/bash
          mkdir -p ~/.crush_hub/users ~/workspaces
          CURRENT_USER=$(ls -1 ~/.crush_hub/users 2>/dev/null | head -n 1)
          if [ -z "$CURRENT_USER" ]; then CURRENT_USER="default"; fi
          while true; do
            CHOICE=$(dialog --clear --title "Crush Hub OS" --menu "Profile: $CURRENT_USER" 15 50 4 1 "Select Repository" 2 "Switch/Add User" 3 "Exit to Shell" 3>&1 1>&2 2>&3)
            if [ -z "$CHOICE" ]; then
              clear
              echo "Dropped to shell. Type 'hub' to return to menu, or 'exit' to restart OS."
              break
            fi
            case $CHOICE in
              1)
                PAT=$(cat ~/.crush_hub/users/$CURRENT_USER/pat 2>/dev/null)
                if[ -z "$PAT" ]; then dialog --msgbox "No PAT found for $CURRENT_USER. Please switch/add user." 5 45; continue; fi
                dialog --infobox "Fetching repositories..." 5 40
                REPOS=$(curl -s -H "Authorization: token $PAT" "https://api.github.com/user/repos?per_page=100&sort=updated" | jq -r '.[].name' 2>/dev/null)
                if [ -z "$REPOS" ] ||[ "$REPOS" == "null" ]; then dialog --msgbox "Failed to fetch repositories. Check PAT." 5 40; continue; fi
                REPO_OPTIONS=""
                for r in $REPOS; do REPO_OPTIONS="$REPO_OPTIONS $r -"; done
                REPO_CHOICE=$(dialog --clear --title "Repositories" --menu "Select to clone/open:" 20 50 10 $REPO_OPTIONS 3>&1 1>&2 2>&3)
                if [ -n "$REPO_CHOICE" ]; then
                  REPO_DIR=~/workspaces/$CURRENT_USER/$REPO_CHOICE
                  if[ ! -d "$REPO_DIR" ]; then
                    dialog --infobox "Cloning $REPO_CHOICE..." 5 40
                    git clone https://$CURRENT_USER:$PAT@github.com/$CURRENT_USER/$REPO_CHOICE.git $REPO_DIR >/dev/null 2>&1
                  fi
                  echo "$REPO_DIR" > ~/.current_repo
                  clear
                  echo "========================================="
                  echo " Connected to: $REPO_CHOICE"
                  echo " Commands:"
                  echo "   crush -y -> Start AI analysis"
                  echo "   cdw      -> CD to repository root"
                  echo "   save     -> Git add, commit, push"
                  echo "   exit     -> Return to Hub Menu"
                  echo "========================================="
                  cd $REPO_DIR
                  bash
                fi
                ;;
              2)
                USERS=$(ls -1 ~/.crush_hub/users 2>/dev/null)
                USER_OPTIONS=""
                for u in $USERS; do USER_OPTIONS="$USER_OPTIONS $u -"; done
                USER_OPTIONS="$USER_OPTIONS + [Add_New_User]"
                U_CHOICE=$(dialog --clear --title "Users" --menu "Select Profile:" 15 45 5 $USER_OPTIONS 3>&1 1>&2 2>&3)
                if [ "$U_CHOICE" == "+" ]; then
                  NEW_USER=$(dialog --clear --inputbox "GitHub Username:" 8 40 3>&1 1>&2 2>&3)
                  if [ -n "$NEW_USER" ]; then
                    NEW_PAT=$(dialog --clear --passwordbox "GitHub PAT:" 8 40 3>&1 1>&2 2>&3)
                    NEW_EMAIL=$(curl -s -H "Authorization: token $NEW_PAT" https://api.github.com/user | jq -r .email 2>/dev/null)
                    if[ "$NEW_EMAIL" == "null" ] || [ -z "$NEW_EMAIL" ]; then NEW_EMAIL=$(dialog --clear --inputbox "GitHub Email:" 8 40 3>&1 1>&2 2>&3); fi
                    mkdir -p ~/.crush_hub/users/$NEW_USER
                    echo "$NEW_PAT" > ~/.crush_hub/users/$NEW_USER/pat
                    echo "$NEW_EMAIL" > ~/.crush_hub/users/$NEW_USER/email
                    CURRENT_USER=$NEW_USER
                  fi
                elif [ -n "$U_CHOICE" ]; then
                  CURRENT_USER=$U_CHOICE
                fi
                ;;
              3)
                clear
                echo "Dropped to shell. Type 'hub' to return to menu, or 'exit' to restart OS."
                break
                ;;
            esac
          done
          EOF
          sudo chmod +x /usr/local/bin/hub

      - name: Set Pre-Loaded User & Aliases
        run: |
          mkdir -p ~/.crush_hub/users/${{ github.actor }}
          echo '${{ secrets.GH_SYNC_TOKEN }}' > ~/.crush_hub/users/${{ github.actor }}/pat
          echo '${{ github.actor }}@cloud.local' > ~/.crush_hub/users/${{ github.actor }}/email
          echo "alias cdw='cd \$(cat ~/.current_repo 2>/dev/null || echo \$HOME/workspaces)'" >> ~/.bashrc
          echo "alias save='git add . && git commit -m \"Manual Sync\" && git push'" >> ~/.bashrc

      - name: Setup Qwen Credentials & Crush Config
        run: |
          mkdir -p ~/.qwen
          echo '${{ secrets.CACHE_BLOB }}' > ~/.qwen/oauth_creds_acc1.json
          echo '${{ secrets.CACHE_BLOB_2 }}' > ~/.qwen/oauth_creds_acc2.json
          mkdir -p ~/.config/crush
          cat << 'EOF' > ~/.config/crush/crush.json
          {
            "providers": {
              "proxy": {
                "name": "Qwen Proxy (Free)",
                "type": "openai-compat",
                "base_url": "http://localhost:8080/v1",
                "api_key": "dummy",
                "models":[{"id": "coder-model", "name": "Qwen 3.6 Plus", "context_window": 1000000}]
              }
            },
            "options": {"tui": {"compact_mode": true}}
          }
          EOF

      - name: Start Qwen Proxy & Verify Logs
        run: |
          export QWEN_CODE_AUTH_USE=false
          qwen-proxy serve --headless > /home/runner/proxy.log 2>&1 &
          sleep 6
          echo "=================== PROXY LOGS ==================="
          cat /home/runner/proxy.log
          echo "=================================================="

      - name: Start Immortal Hub OS & Active Watchtower
        run: |
          mkdir -p ~/.ssh
          curl -s https://github.com/${{ github.actor }}.keys > ~/.ssh/authorized_keys
          
          # Launch tmate with an infinite loop. If bash dies, it respawns instantly.
          tmate -S /tmp/tmate.sock -a ~/.ssh/authorized_keys new-session -d "while true; do bash -c 'source ~/.bashrc && hub'; done"
          tmate -S /tmp/tmate.sock wait tmate-ready
          
          SSH_LINK=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          SESSION_ID=$(echo "$SSH_LINK" | cut -d'@' -f1 | cut -d' ' -f2)
          WEB_LINK="https://tmate.io/t/$SESSION_ID"
          
          echo "=================================================================="
          echo "🚀 TMATE OS READY"
          echo "SSH: $SSH_LINK"
          echo "WEB: $WEB_LINK"
          echo "=================================================================="
          
          LAST_CLIENTS=0
          TIMER=0
          
          while true; do
            CLIENTS=$(tmate -S /tmp/tmate.sock list-clients 2>/dev/null | wc -l)
            if[ "$CLIENTS" != "$LAST_CLIENTS" ]; then
              if [ "$CLIENTS" -gt "$LAST_CLIENTS" ]; then
                echo "[$(date)] 🟢 USER JOINED | Active connections: $CLIENTS"
              else
                echo "[$(date)] 🔴 USER LEFT | Active connections: $CLIENTS"
              fi
              echo "SSH: $SSH_LINK"
              echo "WEB: $WEB_LINK"
              LAST_CLIENTS=$CLIENTS
              TIMER=0
            fi
            if [ $TIMER -ge 900 ]; then
              echo "[$(date)] 🕒 15-Minute Link Reminder:"
              echo "SSH: $SSH_LINK"
              echo "WEB: $WEB_LINK"
              TIMER=0
            fi
            sleep 5
            TIMER=$((TIMER+5))
          done

      - name: Auto-Save Multi-Repo on Terminate
        if: always()
        run: |
          for user_dir in /home/runner/workspaces/*; do
            [ -d "$user_dir" ] || continue
            user=$(basename "$user_dir")
            email=$(cat /home/runner/.crush_hub/users/$user/email 2>/dev/null || echo "qwen@cloud.local")
            for repo_dir in "$user_dir"/*; do
              [ -d "$repo_dir/.git" ] || continue
              cd "$repo_dir"
              git config user.name "$user"
              git config user.email "$email"
              git add .
              git diff-index --quiet HEAD || (git commit -m "Auto-save: Cloud session sync" && git push)
            done
          done
