name: ☁ Cloud Hub OS

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Session label shown in the OS header'
        required: false
        default: 'Cloud Hub OS'
        type: string

jobs:
  cloud-os:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix Global Node/NPM Path
        run: |
          NPM_BIN=$(npm config get prefix)/bin
          echo "$NPM_BIN" >> "$GITHUB_PATH"
          echo "export PATH=\"$NPM_BIN:\$PATH\"" >> ~/.bashrc
          echo "export PATH=\"$NPM_BIN:\$PATH\"" >> ~/.profile

      - name: Install System Packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            tmate \
            tmux \
            dialog \
            jq \
            python3-pip \
            libsodium-dev \
            git \
            curl \
            wget \
            openssh-server \
            procps \
            iproute2
          pip install PyNaCl --break-system-packages -q

      - name: Install ttyd (Web Terminal Server)
        run: |
          TTYD_VER=$(curl -sf https://api.github.com/repos/tsl0922/ttyd/releases/latest \
            | jq -r '.tag_name')
          wget -qO /tmp/ttyd \
            "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VER}/ttyd.x86_64"
          sudo install /tmp/ttyd /usr/local/bin/ttyd
          ttyd --version

      - name: Install Cloudflared (HTTP Tunnel for Browser Access)
        run: |
          curl -L \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      - name: Install Qwen Proxy
        run: |
          npm install -g qwen-proxy --silent --no-fund --no-audit
          command -v qwen-proxy || { echo "qwen-proxy install failed"; exit 1; }

      - name: Install Hermes Agent via UV
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          echo "export PATH=\"$HOME/.local/bin:\$PATH\"" >> ~/.bashrc
          git clone https://github.com/NousResearch/hermes-agent.git /opt/hermes-agent
          cd /opt/hermes-agent
          uv venv venv --python 3.11
          source venv/bin/activate
          uv pip install -e ".[all]" -q
          sudo ln -sf /opt/hermes-agent/venv/bin/hermes /usr/local/bin/hermes
          echo "export PATH=\"/opt/hermes-agent/venv/bin:\$PATH\"" >> ~/.bashrc
          hermes --version 2>/dev/null || echo "hermes installed (version flag may not exist)"

      - name: Build Secret Encryption Helper
        run: |
          sudo tee /usr/local/bin/hub_encrypt.py > /dev/null << 'PYEOF'
          #!/usr/bin/env python3
          import sys, base64
          from nacl import encoding, public
          if len(sys.argv) != 3:
              sys.exit(1)
          try:
              pk  = public.PublicKey(sys.argv[1].encode(), encoding.Base64Encoder())
              box = public.SealedBox(pk)
              enc = box.encrypt(sys.argv[2].encode())
              print(base64.b64encode(enc).decode())
          except Exception:
              sys.exit(1)
          PYEOF
          sudo chmod +x /usr/local/bin/hub_encrypt.py

      - name: Build Hub OS Shared Library
        run: |
          sudo mkdir -p /usr/local/lib/hubos
          sudo tee /usr/local/lib/hubos/lib.sh > /dev/null << 'LIBEOF'
          #!/bin/bash
          export HUB_DIR="$HOME/.crush_hub"
          export USERS_DIR="$HUB_DIR/users"
          export WORKSPACES="$HOME/workspaces"
          export HUB_CONF="$HUB_DIR/config"
          export TMUX_SESSION="cloud"
          export SESSION_LABEL="${SESSION_LABEL:-Cloud Hub OS}"
          mkdir -p "$USERS_DIR" "$WORKSPACES" "$HUB_CONF"

          hub_active_user() {
            cat "$HUB_CONF/active_user" 2>/dev/null \
              || ls -1t "$USERS_DIR" 2>/dev/null | head -n1 \
              || echo "default"
          }

          hub_set_user() {
            echo "$1" > "$HUB_CONF/active_user"
          }

          hub_user_pat() {
            local u="${1:-$(hub_active_user)}"
            cat "$USERS_DIR/$u/pat" 2>/dev/null
          }

          hub_user_email() {
            local u="${1:-$(hub_active_user)}"
            cat "$USERS_DIR/$u/email" 2>/dev/null || echo "${u}@cloud.local"
          }

          hub_current_repo() {
            cat "$HUB_CONF/current_repo" 2>/dev/null
          }

          hub_set_repo() {
            echo "$1" > "$HUB_CONF/current_repo"
          }

          hub_github_repo() {
            echo "${GITHUB_REPOSITORY:-$(cat "$HUB_CONF/github_repo" 2>/dev/null)}"
          }

          hub_push_secret() {
            local sname="$1" sval="$2" pat="${3:-$(hub_user_pat)}" repo
            repo="$(hub_github_repo)"
            if [ -z "$pat" ]; then
              dialog --msgbox "ERROR: No PAT found for current user." 7 52; return 1
            fi
            if [ -z "$repo" ]; then
              dialog --msgbox "ERROR: GitHub repo not set." 7 52; return 1
            fi
            if [ -z "$sname" ] || [ -z "$sval" ]; then
              dialog --msgbox "ERROR: Secret name or value is empty." 5 45; return 1
            fi
            local pk_json
            pk_json=$(curl -sf \
              -H "Authorization: Bearer $pat" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/actions/secrets/public-key" 2>/dev/null)
            if [ -z "$pk_json" ] || [ "$(echo "$pk_json" | jq -r '.key // empty')" = "" ]; then
              dialog --msgbox "ERROR: Could not fetch repo public key.\nCheck PAT has repo scope." 7 58
              return 1
            fi
            local key_id key_val encrypted http_code
            key_id=$(echo "$pk_json" | jq -r '.key_id')
            key_val=$(echo "$pk_json" | jq -r '.key')
            encrypted=$(python3 /usr/local/bin/hub_encrypt.py "$key_val" "$sval" 2>/dev/null)
            if [ -z "$encrypted" ]; then
              dialog --msgbox "ERROR: Encryption failed. Is PyNaCl installed?" 7 55; return 1
            fi
            http_code=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer $pat" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repo/actions/secrets/$sname" \
              -d "{\"encrypted_value\":\"$encrypted\",\"key_id\":\"$key_id\"}" 2>/dev/null) || true
            case "$http_code" in
              201|204) dialog --msgbox "✅ Secret '$sname' saved!\nAvailable on the NEXT run." 8 52 ;;
              401|403) dialog --msgbox "ERROR $http_code: Permission denied.\nPAT needs repo scope (classic)." 7 58 ;;
              404)     dialog --msgbox "ERROR 404: Repo '$repo' not found." 7 52 ;;
              *)       dialog --msgbox "ERROR: API returned HTTP $http_code." 6 52 ;;
            esac
          }

          hub_save_repo() {
            local repo_path="$1"
            local msg="${2:-Cloud session sync $(date -u '+%Y-%m-%d %H:%M UTC')}"
            local user="${3:-$(hub_active_user)}"
            [ -d "$repo_path/.git" ] || return 1
            if [ -f "$repo_path/.noautosave" ]; then
              echo "  ⏭  $(basename "$repo_path") — skipped (auto-save disabled)"
              return 0
            fi
            (
              cd "$repo_path" || return 1
              git config user.name  "$user"
              git config user.email "$(hub_user_email "$user")"
              git add -A
              if git diff-index --quiet HEAD 2>/dev/null; then
                echo "  ✓ $(basename "$repo_path") — nothing to commit"
              else
                git commit -m "$msg" && git push && echo "  ✅ $(basename "$repo_path") saved"
              fi
            ) 2>&1
          }

          hub_ensure_window() {
            local user="${1:-$(hub_active_user)}"
            local win_name="u-${user}"
            if tmux has-session -t "$TMUX_SESSION" 2>/dev/null; then
              if ! tmux list-windows -t "$TMUX_SESSION" -F '#W' 2>/dev/null | grep -qx "$win_name"; then
                tmux new-window -t "$TMUX_SESSION" -n "$win_name" 2>/dev/null
              fi
              if [ -n "$TMUX" ]; then
                tmux select-window -t "$TMUX_SESSION:$win_name" 2>/dev/null
              fi
            fi
          }

          hub_print_links() {
            local tmate_ssh tmate_web cf_web
            tmate_ssh=$(cat "$HUB_CONF/tmate_ssh" 2>/dev/null)
            tmate_web=$(cat "$HUB_CONF/tmate_web" 2>/dev/null)
            cf_web=$(cat "$HUB_CONF/cf_web" 2>/dev/null)
            echo ""
            echo "  ┌─────────────────────────────────────────────────────────┐"
            echo "  │  ☁  ${SESSION_LABEL}"
            echo "  │  SSH (Termux/iOS/Linux/Mac/Windows):                    │"
            echo "  │  ${tmate_ssh:-connecting...}"
            echo "  │  Browser (tmate):  ${tmate_web:-connecting...}"
            echo "  │  Browser (ttyd):   ${cf_web:-connecting...}"
            echo "  └─────────────────────────────────────────────────────────┘"
            echo ""
          }
          LIBEOF
          sudo chmod 644 /usr/local/lib/hubos/lib.sh

      - name: Build Hub OS Main Script
        run: |
          sudo tee /usr/local/bin/hub > /dev/null << 'HUBEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          CURRENT_USER="$(hub_active_user)"

          _menu_secrets() {
            while true; do
              local REPO SCHOICE
              REPO="$(hub_github_repo)"
              SCHOICE=$(dialog --clear --title "🔐 Secret Manager" \
                --menu "Repo: ${REPO:-not set}" 18 62 6 \
                1 "Save PAT → GH_SYNC_TOKEN" \
                2 "Save Qwen blob 1 → CACHE_BLOB" \
                3 "Save Qwen blob 2 → CACHE_BLOB_2" \
                4 "Push a custom secret..." \
                5 "ℹ  How does this work?" \
                6 "← Back" \
                3>&1 1>&2 2>&3) || return
              case "$SCHOICE" in
                1)
                  local v
                  v=$(dialog --clear --passwordbox "GitHub PAT (classic, repo+workflow scope):" 9 58 3>&1 1>&2 2>&3)
                  [ -n "$v" ] && hub_push_secret "GH_SYNC_TOKEN" "$v"
                  ;;
                2)
                  local v
                  v=$(dialog --clear --inputbox "Paste CACHE_BLOB JSON content:" 10 62 3>&1 1>&2 2>&3)
                  [ -n "$v" ] && hub_push_secret "CACHE_BLOB" "$v"
                  ;;
                3)
                  local v
                  v=$(dialog --clear --inputbox "Paste CACHE_BLOB_2 JSON content:" 10 62 3>&1 1>&2 2>&3)
                  [ -n "$v" ] && hub_push_secret "CACHE_BLOB_2" "$v"
                  ;;
                4)
                  local sname sval
                  sname=$(dialog --clear --inputbox "Secret name (e.g. MY_API_KEY):" 8 52 3>&1 1>&2 2>&3)
                  if [ -n "$sname" ]; then
                    sval=$(dialog --clear --passwordbox "Secret value:" 8 52 3>&1 1>&2 2>&3)
                    [ -n "$sval" ] && hub_push_secret "$sname" "$sval"
                  fi
                  ;;
                5)
                  dialog --msgbox \
                    "Secrets are encrypted with LibSodium and\npushed to GitHub via REST API.\n\nThey appear as encrypted repo secrets and\nare injected automatically on the NEXT run.\n\nRequires a classic PAT with 'repo' scope.\nFine-grained PATs do NOT support secrets API." \
                    13 58
                  ;;
                6) return ;;
              esac
            done
          }

          _menu_repos() {
            local PAT
            PAT="$(hub_user_pat "$CURRENT_USER")"
            if [ -z "$PAT" ]; then
              dialog --msgbox "No PAT found for '$CURRENT_USER'.\nUse option 2 to add/switch user." 7 52
              return
            fi
            dialog --infobox "Fetching repositories for $CURRENT_USER..." 4 52
            local REPOS
            REPOS=$(curl -sf \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/user/repos?per_page=100&sort=updated&affiliation=owner,collaborator" \
              | jq -r '.[].full_name' 2>/dev/null)
            if [ -z "$REPOS" ]; then
              dialog --msgbox "Failed to fetch repos.\nCheck PAT has 'repo' scope and is valid." 7 52
              return
            fi
            local OPTS=()
            while IFS= read -r r; do
              OPTS+=("$r" "→")
            done <<< "$REPOS"
            local REPO_CHOICE
            REPO_CHOICE=$(dialog --clear --title "📂 Your Repositories" \
              --menu "Select to clone or open:" 24 66 16 \
              "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
            local SHORT="${REPO_CHOICE##*/}"
            local REPO_DIR="$WORKSPACES/$CURRENT_USER/$SHORT"
            if [ ! -d "$REPO_DIR/.git" ]; then
              dialog --infobox "Cloning $REPO_CHOICE ..." 4 52
              if ! git clone \
                  "https://$CURRENT_USER:$PAT@github.com/$REPO_CHOICE.git" \
                  "$REPO_DIR" >/dev/null 2>&1; then
                dialog --msgbox "Clone failed.\nCheck PAT has access to this repo." 7 50
                return
              fi
              git -C "$REPO_DIR" config user.name  "$CURRENT_USER"
              git -C "$REPO_DIR" config user.email "$(hub_user_email "$CURRENT_USER")"
            fi
            hub_set_repo "$REPO_DIR"
            clear
            printf '\e[1;32m'
            printf '╔══════════════════════════════════════════════════╗\n'
            printf '║  ✅ %-44s ║\n' "$SHORT"
            printf '║  📁 %-44s ║\n' "$REPO_DIR"
            printf '╠══════════════════════════════════════════════════╣\n'
            printf '║  h [prompt]   → Hermes AI (isolated brain)       ║\n'
            printf '║  cdw          → jump to this repo root           ║\n'
            printf '║  go [name]    → switch to another repo           ║\n'
            printf '║  save [msg]   → git add + commit + push          ║\n'
            printf '║  noautosave   → disable auto-save for this repo  ║\n'
            printf '║  autosave_on  → re-enable auto-save              ║\n'
            printf '║  secrets      → manage GitHub secrets            ║\n'
            printf '║  links        → show SSH/browser access links    ║\n'
            printf '║  hub          → back to main menu                ║\n'
            printf '╚══════════════════════════════════════════════════╝\n'
            printf '\e[0m\n'
            bash --rcfile <(cat ~/.bashrc; echo "cd '$REPO_DIR'")
          }

          _menu_users() {
            while true; do
              local USERS_LIST OPTS=() U_CHOICE
              USERS_LIST=$(ls -1 "$USERS_DIR" 2>/dev/null)
              while IFS= read -r u; do
                [ -n "$u" ] && OPTS+=("$u" "$([ "$u" = "$CURRENT_USER" ] && echo 'active ✅' || echo 'switch →')")
              done <<< "$USERS_LIST"
              OPTS+=("__add__" "+ Add new user")
              U_CHOICE=$(dialog --clear --title "👥 User Profiles" \
                --menu "Active: $CURRENT_USER" 18 54 10 \
                "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
              if [ "$U_CHOICE" = "__add__" ]; then
                local NEW_USER NEW_PAT NEW_EMAIL PROFILE
                NEW_USER=$(dialog --clear --inputbox "GitHub Username:" 8 48 3>&1 1>&2 2>&3)
                [ -z "$NEW_USER" ] && return
                NEW_PAT=$(dialog --clear --passwordbox \
                  "GitHub PAT\n(needs: repo + workflow scopes, classic PAT):" 10 54 3>&1 1>&2 2>&3)
                [ -z "$NEW_PAT" ] && return
                dialog --infobox "Verifying credentials with GitHub API..." 4 48
                PROFILE=$(curl -sf \
                  -H "Authorization: token $NEW_PAT" \
                  https://api.github.com/user 2>/dev/null)
                if [ -z "$PROFILE" ] || [ "$(echo "$PROFILE" | jq -r '.login // empty')" = "" ]; then
                  dialog --msgbox "ERROR: Could not verify credentials.\nCheck the PAT is valid and not expired." 7 54
                  return
                fi
                NEW_EMAIL=$(echo "$PROFILE" | jq -r '.email // empty')
                if [ -z "$NEW_EMAIL" ] || [ "$NEW_EMAIL" = "null" ]; then
                  NEW_EMAIL=$(dialog --clear --inputbox \
                    "Email not on public profile.\nEnter your git commit email:" 9 54 3>&1 1>&2 2>&3)
                  [ -z "$NEW_EMAIL" ] && NEW_EMAIL="${NEW_USER}@cloud.local"
                fi
                mkdir -p "$USERS_DIR/$NEW_USER"
                printf '%s' "$NEW_PAT"   > "$USERS_DIR/$NEW_USER/pat"
                printf '%s' "$NEW_EMAIL" > "$USERS_DIR/$NEW_USER/email"
                CURRENT_USER="$NEW_USER"
                hub_set_user "$CURRENT_USER"
                hub_ensure_window "$CURRENT_USER"
                if dialog --yesno \
                  "User '$NEW_USER' added! ✅\n\nSave this PAT as GH_SYNC_TOKEN in GitHub Secrets?\nThis makes it available automatically on the next run." \
                  10 58; then
                  hub_push_secret "GH_SYNC_TOKEN" "$NEW_PAT" "$NEW_PAT"
                fi
              elif [ -n "$U_CHOICE" ]; then
                CURRENT_USER="$U_CHOICE"
                hub_set_user "$CURRENT_USER"
                hub_ensure_window "$CURRENT_USER"
                dialog --msgbox "✅ Switched to '$CURRENT_USER'" 5 36
                return
              fi
            done
          }

          _save_all() {
            dialog --infobox "Saving all open repositories..." 4 42
            local results=""
            for repo_dir in "$WORKSPACES/$CURRENT_USER"/*/; do
              [ -d "$repo_dir/.git" ] || continue
              local out
              out=$(hub_save_repo "$repo_dir" "Manual cloud save" "$CURRENT_USER")
              results+="$out\n"
            done
            dialog --msgbox "Save complete:\n\n${results:-No repos found under $WORKSPACES/$CURRENT_USER}" 14 58
          }

          hub_ensure_window "$CURRENT_USER"

          while true; do
            CURRENT_USER="$(hub_active_user)"
            CHOICE=$(dialog --clear \
              --title "☁  $SESSION_LABEL" \
              --menu "User: $CURRENT_USER  |  $(date '+%a %H:%M')  |  type 'hub' to return here" \
              21 66 8 \
              1 "📂 Select / Clone Repository" \
              2 "👥 Switch / Add User" \
              3 "🔐 Manage GitHub Secrets" \
              4 "💾 Save All Open Repos" \
              5 "🔗 Show Access Links" \
              6 "📋 Tmux Window List" \
              7 "🐚 Drop to Shell" \
              8 "❌ Exit Hub" \
              3>&1 1>&2 2>&3)
            [ $? -ne 0 ] && CHOICE=7
            case "$CHOICE" in
              1) _menu_repos ;;
              2) _menu_users ;;
              3) _menu_secrets ;;
              4) _save_all ;;
              5)
                clear
                hub_print_links
                read -rp "Press Enter to return to menu..." _dummy
                ;;
              6)
                clear
                tmux list-windows -t "$TMUX_SESSION" 2>/dev/null \
                  || echo "(not attached to a tmux session)"
                read -rp "Press Enter to return to menu..." _dummy
                ;;
              7)
                clear
                cat << 'SHELLTIP'
          ┌────────────────────────────────────────────────────────┐
          │  Shell — quick reference                               │
          │  hub          → main menu                             │
          │  cdw          → cd to current repo root               │
          │  go [name]    → switch repos (fuzzy / picker)         │
          │  save [msg]   → commit and push current repo          │
          │  noautosave   → exclude this repo from auto-saving    │
          │  autosave_on  → re-enable auto-saving for this repo   │
          │  secrets      → push secrets to GitHub                │
          │  links        → show SSH / browser access links       │
          │  h [prompt]   → Hermes AI with isolated brain         │
          │                                                        │
          │  Tmux (when attached via SSH):                         │
          │  Ctrl+B c      new window                             │
          │  Ctrl+B n/p    next / previous window                 │
          │  Ctrl+B 1-9    jump to window number                  │
          │  Ctrl+B d      detach (session stays alive!)          │
          │  Ctrl+B m      Toggle Mouse ON/OFF (to swipe scroll)  │
          └────────────────────────────────────────────────────────┘
          SHELLTIP
                break
                ;;
              8)
                clear
                echo "Session stays alive in background. Goodbye!"
                exit 0
                ;;
            esac
          done
          HUBEOF
          sudo chmod +x /usr/local/bin/hub

      - name: Build Isolated Hermes Brain Router (h command)
        run: |
          sudo tee /usr/local/bin/h > /dev/null << 'HEOF'
          #!/bin/bash
          export PATH="$HOME/.local/bin:/opt/hermes-agent/venv/bin:$PATH"
          export HERMES_HOME="${HERMES_HOME:-$HOME/.hermes}"
          export OPENAI_BASE_URL="http://localhost:8080/v1"
          export OPENAI_API_KEY="dummy"

          REPO_NAME=$(basename "$PWD")
          DISALLOWED="workspace workspaces runner home"

          for d in $DISALLOWED; do
            if [ "$REPO_NAME" = "$d" ]; then
              printf '\e[1;31m❌ cd into a repository first before launching Hermes.\e[0m\n'
              printf '   Current dir: %s\n' "$PWD"
              printf '   Use: go <repo-name>  or  cdw\n'
              exit 1
            fi
          done

          PROFILE_DIR="$HERMES_HOME/profiles/$REPO_NAME"
          mkdir -p "$PROFILE_DIR"

          if [ ! -f "$PROFILE_DIR/config.yaml" ] && [ -f "$HERMES_HOME/config.yaml" ]; then
            cp "$HERMES_HOME/config.yaml" "$PROFILE_DIR/config.yaml"
          fi

          if [ ! -f "$PROFILE_DIR/.env" ] && [ -f "$HERMES_HOME/.env" ]; then
            cp "$HERMES_HOME/.env" "$PROFILE_DIR/.env"
          fi

          printf '\e[1;36m'
          printf '┌──────────────────────────────────────────────┐\n'
          printf '│  🧠 Hermes — isolated brain: [%s]\n' "$REPO_NAME"
          printf '│  Profile: %s\n' "$PROFILE_DIR"
          printf '│  Model:   qwen3.6-plus via Qwen Proxy        │\n'
          printf '│  Context: 1M tokens | Output: 65K | Timeout: 6h\n'
          printf '└──────────────────────────────────────────────┘\n'
          printf '\e[0m\n'

          exec hermes "$@"
          HEOF
          sudo chmod +x /usr/local/bin/h

      - name: Build Helper Tools (save, secrets, links, noautosave)
        run: |
          sudo tee /usr/local/bin/save > /dev/null << 'SAVEEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          TARGET="${HUB_CURRENT_REPO_OVERRIDE:-$(hub_current_repo)}"
          TARGET="${TARGET:-$(pwd)}"
          MSG="${1:-Cloud session save $(date -u '+%Y-%m-%d %H:%M UTC')}"
          if [ ! -d "$TARGET/.git" ]; then
            printf '\e[1;33m⚠  No git repo at: %s\e[0m\n' "$TARGET"
            printf '   Use "go <name>" or "cdw" to navigate to a repo first.\n'
            exit 1
          fi
          USER="$(hub_active_user)"
          cd "$TARGET" || exit 1
          git config user.name  "$USER"
          git config user.email "$(hub_user_email "$USER")"
          git add -A
          if git diff-index --quiet HEAD 2>/dev/null; then
            printf '✅ Nothing new to commit in: %s\n' "$(basename "$TARGET")"
          else
            git commit -m "$MSG" && git push \
              && printf '✅ Saved and pushed: %s\n' "$TARGET"
          fi
          SAVEEOF
          sudo chmod +x /usr/local/bin/save

          sudo tee /usr/local/bin/secrets > /dev/null << 'SECEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          _push_custom() {
            local SNAME SVAL
            SNAME=$(dialog --clear --inputbox "Secret name:" 8 50 3>&1 1>&2 2>&3) || return
            SVAL=$(dialog --clear --passwordbox "Secret value:" 8 50 3>&1 1>&2 2>&3) || return
            [ -n "$SNAME" ] && [ -n "$SVAL" ] && hub_push_secret "$SNAME" "$SVAL"
          }
          while true; do
            CHOICE=$(dialog --clear --title "🔐 Secret Manager" \
              --menu "Repo: $(hub_github_repo)" 14 60 5 \
              1 "Push GH_SYNC_TOKEN (PAT)" \
              2 "Push CACHE_BLOB" \
              3 "Push CACHE_BLOB_2" \
              4 "Push custom secret" \
              5 "Exit" \
              3>&1 1>&2 2>&3) || break
            case "$CHOICE" in
              1) v=$(dialog --clear --passwordbox "PAT value:" 8 50 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "GH_SYNC_TOKEN" "$v" ;;
              2) v=$(dialog --clear --inputbox "CACHE_BLOB:" 10 60 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "CACHE_BLOB" "$v" ;;
              3) v=$(dialog --clear --inputbox "CACHE_BLOB_2:" 10 60 3>&1 1>&2 2>&3); [ -n "$v" ] && hub_push_secret "CACHE_BLOB_2" "$v" ;;
              4) _push_custom ;;
              5) break ;;
            esac
          done
          SECEOF
          sudo chmod +x /usr/local/bin/secrets

          sudo tee /usr/local/bin/links > /dev/null << 'LEOF'
          #!/bin/bash
          source /usr/local/lib/hubos/lib.sh
          hub_print_links
          LEOF
          sudo chmod +x /usr/local/bin/links

          cat >> ~/.bashrc << 'RCEOF'

          export TERM="${TERM:-xterm-256color}"
          source /usr/local/lib/hubos/lib.sh 2>/dev/null

          cdw() {
            local REPO
            REPO="$(hub_current_repo)"
            if [ -z "$REPO" ] || [ ! -d "$REPO" ]; then
              printf 'No repo set. Use hub → Select Repository, or: go <name>\n'
              return 1
            fi
            cd "$REPO" && printf '📁 %s\n' "$REPO"
          }

          go() {
            local USER WORKDIR TARGET CHOICE OPTS=()
            USER="$(hub_active_user)"
            WORKDIR="$WORKSPACES/$USER"
            if [ -n "$1" ]; then
              TARGET=$(find "$WORKDIR" -maxdepth 1 -type d -name "*${1}*" 2>/dev/null | head -1)
              if [ -z "$TARGET" ]; then
                printf 'No repo matching "%s" under %s\n' "$1" "$WORKDIR"
                printf 'Available:\n'
                ls -1 "$WORKDIR" 2>/dev/null || printf '  (none cloned yet — use hub)\n'
                return 1
              fi
            else
              while IFS= read -r d; do
                [ -d "$d/.git" ] && OPTS+=("$(basename "$d")" "→ $d")
              done < <(find "$WORKDIR" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | sort)
              if [ ${#OPTS[@]} -eq 0 ]; then
                printf 'No local repos found. Clone one via hub (option 1).\n'
                return 1
              fi
              CHOICE=$(dialog --clear --title "Go To Repo" \
                --menu "Select:" 20 64 14 "${OPTS[@]}" 3>&1 1>&2 2>&3) || return
              TARGET="$WORKDIR/$CHOICE"
            fi
            hub_set_repo "$TARGET"
            cd "$TARGET" && printf '📁 %s\n' "$TARGET"
          }

          noautosave() {
            local REPO="$(hub_current_repo)"
            [ -z "$REPO" ] && echo "Not in a workspace!" && return 1
            touch "$REPO/.noautosave"
            echo "🚫 Auto-save disabled for $(basename "$REPO")."
          }

          autosave_on() {
            local REPO="$(hub_current_repo)"
            [ -z "$REPO" ] && echo "Not in a workspace!" && return 1
            rm -f "$REPO/.noautosave"
            echo "✅ Auto-save enabled for $(basename "$REPO")."
          }
          RCEOF

      - name: Configure Pre-loaded User
        run: |
          source /usr/local/lib/hubos/lib.sh
          mkdir -p "$USERS_DIR/${{ github.actor }}"
          printf '%s' '${{ secrets.GH_SYNC_TOKEN }}' > "$USERS_DIR/${{ github.actor }}/pat"
          printf '%s' '${{ github.actor }}@cloud.local' > "$USERS_DIR/${{ github.actor }}/email"
          hub_set_user "${{ github.actor }}"
          printf '%s' '${{ github.repository }}' > "$HUB_CONF/github_repo"

      - name: Setup Qwen Proxy Credentials
        run: |
          mkdir -p ~/.qwen
          printf '%s' '${{ secrets.CACHE_BLOB }}'   > ~/.qwen/oauth_creds_acc1.json
          printf '%s' '${{ secrets.CACHE_BLOB_2 }}' > ~/.qwen/oauth_creds_acc2.json

      - name: Configure Global Hermes Brain
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << 'EOF'
          model: openai/qwen3.6-plus
          agent:
            max_iterations: 1000
            max_context: 1000000
            compaction_threshold: 995000
            subagent_context_window: 1000000
          tools:
            timeout: 21600
          api:
            timeout: 21600
            max_retries: 3
          display:
            skin: default
            verbose: true
            tool_progress_command: true
          EOF

          cat > ~/.hermes/.env << 'EOF'
          OPENAI_API_KEY=dummy
          OPENAI_BASE_URL=http://localhost:8080/v1
          HERMES_SUPPRESS_PROVIDER_WARNING=true
          EOF

      - name: Configure Tmux Appearance
        run: |
          cat > ~/.tmux.conf << 'EOF'
          set -g status-style        bg=colour235,fg=colour250
          set -g status-left         "#[fg=colour82,bold] ☁ Hub OS #[fg=colour240]│ "
          set -g status-right        "#[fg=colour240]%a %d %H:%M  #[fg=colour82]#{session_windows}w "
          set -g status-left-length  24
          set -g status-right-length 30
          set -g window-status-format         " #I:#W "
          set -g window-status-current-format "#[fg=colour82,bold,bg=colour238] #I:#W● "
          set -g window-status-separator      ""
          set -g mouse on
          set -g history-limit 50000
          set -g base-index 1
          set -g pane-base-index 1
          set -g default-terminal "screen-256color"
          set -g terminal-overrides ',xterm-256color:Tc'
          set -g escape-time 10
          set -g renumber-windows on
          set -g allow-rename off
          
          bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"
          bind r source-file ~/.tmux.conf \; display "Config reloaded"
          bind H run-shell "hub"
          bind S run-shell "save"
          bind L run-shell "links"
          EOF

      - name: Start Qwen Proxy and Verify
        run: |
          export QWEN_CODE_AUTH_USE=false
          export DEFAULT_MAX_TOKENS=65536
          qwen-proxy serve --headless > ~/proxy.log 2>&1 &
          PROXY_PID=$!
          echo "Qwen proxy started (PID $PROXY_PID), waiting for startup..."
          sleep 8

          echo ""
          echo "══════════ Qwen Proxy Startup Log ══════════"
          cat ~/proxy.log
          echo "════════════════════════════════════════════"
          echo ""

          PROXY_OK=false
          for attempt in 1 2 3; do
            if curl -sf http://localhost:8080/v1/models > /dev/null 2>&1; then
              PROXY_OK=true
              break
            fi
            echo "Attempt $attempt: proxy not ready yet, waiting 5s..."
            sleep 5
            echo "--- Proxy log tail ---"
            tail -20 ~/proxy.log
            echo "----------------------"
          done

          if $PROXY_OK; then
            echo ""
            echo "✅ Qwen proxy is responding on http://localhost:8080/v1"
            echo "   Model list:"
            curl -sf http://localhost:8080/v1/models | jq -r '.data[].id' 2>/dev/null \
              | sed 's/^/   - /' || echo "   (could not parse model list)"
          else
            echo ""
            echo "⚠️  Qwen proxy did not respond after 3 attempts."
            echo "   Hermes AI (h command) may not work this session."
            echo "   Check the proxy log above for errors."
          fi

      - name: Launch tmate, ttyd, Cloudflare Tunnel & Hub OS
        env:
          SESSION_LABEL: ${{ inputs.label || 'Cloud Hub OS' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"
          SESSION_LABEL="${SESSION_LABEL:-Cloud Hub OS}"

          source /usr/local/lib/hubos/lib.sh

          cat >> ~/.bashrc << ENVEOF
          export SESSION_LABEL="$SESSION_LABEL"
          export GITHUB_REPOSITORY="$REPO"
          ENVEOF

          mkdir -p ~/.ssh
          curl -sf "https://github.com/$ACTOR.keys" >> ~/.ssh/authorized_keys 2>/dev/null || true
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys

          tmux new-session -d -s "$TMUX_SESSION" -n "monitor" -x 220 -y 50
          tmux new-window -t "$TMUX_SESSION" -n "u-$ACTOR"
          sleep 1
          tmux send-keys -t "$TMUX_SESSION:u-$ACTOR" \
            "export SESSION_LABEL='$SESSION_LABEL' GITHUB_REPOSITORY='$REPO'; source ~/.bashrc; clear; hub" \
            Enter
          tmux select-window -t "$TMUX_SESSION:monitor"

          tmate -S /tmp/tmate.sock new-session -d -s "tmate-bridge" 2>/dev/null || true
          tmate -S /tmp/tmate.sock wait tmate-ready 2>/dev/null || true
          sleep 3

          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null || echo "unavailable")
          TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null || echo "unavailable")

          if [ "$TMATE_SSH" = "unavailable" ]; then
            echo "⚠️  tmate session not ready — retrying in 5s..."
            sleep 5
            TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null || echo "unavailable")
            TMATE_WEB=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null || echo "unavailable")
          fi

          tmate -S /tmp/tmate.sock send-keys -t "tmate-bridge" \
            "tmux attach-session -t $TMUX_SESSION" Enter 2>/dev/null || true

          ttyd \
            --writable \
            --port 7681 \
            --interface 127.0.0.1 \
            bash -c "source ~/.bashrc; tmux attach-session -t $TMUX_SESSION || hub" \
            > ~/ttyd.log 2>&1 &
          sleep 3

          cloudflared tunnel --url http://localhost:7681 \
            --no-autoupdate > ~/cf.log 2>&1 &
          sleep 10

          CF_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/cf.log | head -n1)

          printf '%s' "$TMATE_SSH" > "$HUB_CONF/tmate_ssh"
          printf '%s' "$TMATE_WEB" > "$HUB_CONF/tmate_web"
          printf '%s' "${CF_URL:-unavailable}" > "$HUB_CONF/cf_web"

          tmux send-keys -t "$TMUX_SESSION:monitor" \
            "export SESSION_LABEL='$SESSION_LABEL'; source ~/.bashrc; clear" Enter

          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║  ☁  $SESSION_LABEL"
          echo "║  Actor: $ACTOR  |  Repo: $REPO"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  SSH (Termux / iOS / Linux / Mac / Windows — no extra tools):"
          echo "║  $TMATE_SSH"
          echo "║"
          echo "║  Browser (tmate web terminal):"
          echo "║  $TMATE_WEB"
          echo "║"
          echo "║  Browser (ttyd via Cloudflare — full-featured terminal):"
          echo "║  ${CF_URL:-still connecting, check cf.log}"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  Termux one-liner:"
          echo "║  pkg install openssh && $TMATE_SSH"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  Tmux: Ctrl+B c=new  n=next  p=prev  [1-9]=jump  d=detach"
          echo "║        Ctrl+B m=toggle Mouse ON/OFF (to swipe scroll in Termux)  ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""

          LAST_CLIENTS=0
          TIMER=0

          while true; do
            CLIENTS=$(tmate -S /tmp/tmate.sock list-clients 2>/dev/null | wc -l)
            if [ "$CLIENTS" != "$LAST_CLIENTS" ]; then
              if [ "$CLIENTS" -gt "$LAST_CLIENTS" ]; then
                echo "[$(date -u '+%H:%M:%S')] 🟢 USER JOINED  — active: $CLIENTS"
              else
                echo "[$(date -u '+%H:%M:%S')] 🔴 USER LEFT   — active: $CLIENTS"
              fi
              LAST_CLIENTS="$CLIENTS"
              TIMER=0
            fi
            if [ "$TIMER" -ge 900 ]; then
              echo "[$(date -u '+%H:%M:%S')] 🕒 15min — SSH: $TMATE_SSH"
              echo "                               WEB: ${CF_URL:-check cf.log}"
              TIMER=0
            fi
            sleep 5
            TIMER=$((TIMER + 5))
          done

      - name: Auto-Save All Repos on Exit
        if: always()
        run: |
          source /usr/local/lib/hubos/lib.sh 2>/dev/null || true
          echo "════ Auto-Save Triggered ════"
          for user_dir in "$WORKSPACES"/*/; do
            [ -d "$user_dir" ] || continue
            USER="$(basename "$user_dir")"
            for repo_dir in "$user_dir"*/; do
              [ -d "$repo_dir/.git" ] || continue
              hub_save_repo "$repo_dir" \
                "Auto-save: runner exit $(date -u '+%Y-%m-%d %H:%M UTC')" \
                "$USER"
            done
          done
          echo "════ Auto-Save Complete ════"
