set -g status-style        bg=colour235,fg=colour250
set -g status-left         "#[fg=colour82,bold] Cloud OS #[fg=colour240]| "
set -g status-right        "#[fg=colour240]%a %d %H:%M  #[fg=colour82]#{session_windows}w "
set -g status-left-length  24
set -g status-right-length 30
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[fg=colour82,bold,bg=colour238] #I:#W* "
set -g window-status-separator      ""
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "screen-256color"
set -g terminal-overrides ',xterm-256color:Tc'
set -g escape-time 10
set -g renumber-windows on
set -g allow-rename off
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "copy-mode -e"
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind H run-shell "hub"
bind S run-shell "save"
bind L run-shell "links"
